<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月度盘点 - 卢米纳电子</title>
    <link rel="stylesheet" href="../css/common.css">
    <style>
        .lock-bar { padding: 15px 30px; background: #ffe8e8; border-bottom: 1px solid var(--danger-color); font-size: 16px; color: var(--danger-color); font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .lock-btn { height: 40px; padding: 0 20px; background: var(--danger-color); color: #fff; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        .lock-btn.locked { background: var(--success-color); }
        .check-table { margin: 20px 30px; background: var(--bg-main); border: 2px solid var(--border-color); border-radius: 4px; flex: 1; overflow: auto; }
        .action-area { padding: 20px 30px; display: flex; gap: 15px; justify-content: center; }
        .main-btn { height: 50px; padding: 0 30px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; color: #fff; }
        .main-btn.primary { background: var(--primary-color); }
        .main-btn.success { background: var(--success-color); }
        .back-btn { margin: 20px 30px; }
        .reason-select { height: 32px; padding: 0 6px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 13px; background: var(--bg-main); }
        /* Password modal */
        .pwd-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center; }
        .pwd-modal.show { display: flex; }
        .pwd-box { background: #fff; border-radius: 12px; width: 400px; padding: 30px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .pwd-box h3 { margin-bottom: 8px; font-size: 20px; }
        .pwd-box .pwd-hint { font-size: 14px; color: #999; margin-bottom: 20px; }
        .pwd-box input { width: 100%; height: 48px; padding: 0 16px; border: 2px solid #ddd; border-radius: 8px; font-size: 20px; text-align: center; letter-spacing: 4px; margin-bottom: 20px; }
        .pwd-box input:focus { outline: none; border-color: var(--primary-color); }
        .pwd-box .pwd-btns { display: flex; gap: 12px; }
        .pwd-box .pwd-btns button { flex: 1; height: 44px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .pwd-btn-cancel { background: #f0f0f0; color: #333; }
        .pwd-btn-confirm { background: var(--primary-color); color: #fff; }
    </style>
</head>
<body>
    <div class="pc-screen">
        <div class="top-nav">
            <div class="nav-title">卢米纳电子库存与财务一体化系统</div>
            <div class="nav-right">
                <div class="eye-switch-wrap"><span>护眼模式</span><div class="eye-switch" id="eyeSwitch" onclick="toggleEyeProtect()"><div class="eye-dot"></div></div></div>
                <div class="user-info">登录人：王主管 | <span id="currentDate"></span></div>
            </div>
        </div>
        <a href="index.html" class="back-btn">← 返回首页</a>

        <div class="lock-bar" id="lockBar">
            <span id="lockText">未锁仓！盘点期间库存变动将影响账实准确性</span>
            <button class="lock-btn" id="lockBtn" onclick="toggleLock()">点击锁仓</button>
        </div>

        <div class="check-table">
            <div class="section-header">
                <span>月度库存盘点表</span>
                <button class="filter-btn export" onclick="exportToExcel('checkTable', '月度盘点表')">导出盘点差异表</button>
            </div>
            <div class="excel-table">
                <table id="checkTable">
                    <thead>
                        <tr><th>SKU</th><th>品名</th><th>系统库存</th><th>实盘数量</th><th>差异</th><th>差异原因</th><th>操作</th></tr>
                    </thead>
                    <tbody id="checkBody"></tbody>
                </table>
            </div>
        </div>

        <div class="action-area">
            <button class="main-btn" style="background:var(--success-color);" onclick="importExcel()">导入Excel盘点表</button>
            <button class="main-btn primary" onclick="submitForReview()">提交待审</button>
        </div>
    </div>

    <!-- Password modal -->
    <div class="pwd-modal" id="pwdModal">
        <div class="pwd-box">
            <h3>🔐 主管复核确认</h3>
            <div class="pwd-hint">请输入主管审批密码（模拟：123456）</div>
            <input type="password" id="pwdInput" placeholder="请输入密码" maxlength="6" onkeydown="if(event.key==='Enter')confirmPassword()">
            <div class="pwd-btns">
                <button class="pwd-btn-cancel" onclick="closePwdModal()">取消</button>
                <button class="pwd-btn-confirm" onclick="confirmPassword()">确认提交</button>
            </div>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/scanner-voice.js"></script>
    <script src="../js/toast.js"></script>
    <script>
        var today = new Date();
        document.getElementById('currentDate').innerText = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');

        var isLocked = false;
        var PRODUCT_NAMES = { 'SPK-A100': '智能音箱 Pro', 'SPK-B200': '监控摄像头 4K', 'SPK-C300': '智能门锁 E1', 'SPK-D400': '无线耳机 T3', 'SPK-E500': '智能手表 S2' };
        var REASONS = ['','盘盈','盘亏','损坏','丢失','其他'];

        // Render check table from stockData
        function renderCheckTable() {
            var stockData = JSON.parse(localStorage.getItem('stockData') || '[]');
            var rows = '';
            for (var i = 0; i < stockData.length; i++) {
                var s = stockData[i];
                var name = PRODUCT_NAMES[s.sku] || s.sku;
                var wq = s.warehouse_qty || 0;
                var reasonOpts = REASONS.map(function(r) { return '<option value="' + r + '">' + (r || '--') + '</option>'; }).join('');
                rows += '<tr>' +
                    '<td>' + s.sku + '</td><td>' + name + '</td><td class="sys-qty">' + wq + '</td>' +
                    '<td><input type="number" class="form-input real-qty" value="' + wq + '" style="width:80px;" oninput="autoCalcDiffPC(this)"></td>' +
                    '<td class="diff-cell status-green">0</td>' +
                    '<td><select class="reason-select">' + reasonOpts + '</select></td>' +
                    '<td><button class="audit-btn pass" onclick="scanCheckItem(this)">扫码录入</button></td>' +
                    '</tr>';
            }
            document.getElementById('checkBody').innerHTML = rows;
        }

        function toggleLock() {
            isLocked = !isLocked;
            var lb = document.getElementById('lockBar'), lt = document.getElementById('lockText'), lbtn = document.getElementById('lockBtn');
            if (isLocked) {
                lb.style.background = '#e8f8e8'; lb.style.borderColor = 'var(--success-color)'; lb.style.color = 'var(--success-color)';
                lt.innerText = '已锁仓！盘点期间禁止库存变动'; lbtn.innerText = '解除锁仓'; lbtn.classList.add('locked');
                addAuditLog('系统设置', '盘点锁仓', '未锁仓', '已锁仓');
            } else {
                lb.style.background = '#ffe8e8'; lb.style.borderColor = 'var(--danger-color)'; lb.style.color = 'var(--danger-color)';
                lt.innerText = '未锁仓！盘点期间库存变动将影响账实准确性'; lbtn.innerText = '点击锁仓'; lbtn.classList.remove('locked');
                addAuditLog('系统设置', '解除盘点锁仓', '已锁仓', '未锁仓');
            }
        }

        function autoCalcDiffPC(input) {
            var row = input.closest('tr');
            var sysQty = parseInt(row.children[2].textContent) || 0;
            var realQty = parseInt(input.value) || 0;
            var diff = realQty - sysQty;
            var diffCell = row.querySelector('.diff-cell');
            diffCell.textContent = diff;
            diffCell.className = 'diff-cell';
            diffCell.classList.add(diff < 0 ? 'status-red' : diff > 0 ? 'status-red' : 'status-green');
        }

        function scanCheckItem(btn) {
            var row = btn.closest('tr');
            var input = row.querySelector('input[type="number"]');
            if (!input) return;
            openScanner(function(value) {
                var scanned = parseInt(value) || 0;
                if (isNaN(scanned) || scanned < 0) scanned = 0;
                input.value = scanned;
                autoCalcDiffPC(input);
            });
        }

        function importExcel() {
            alert('请选择Excel盘点表文件\n模拟导入成功，已自动填充实盘数量');
        }

        // ---- 收集差异行 ----
        function collectDiffRows() {
            var rows = document.querySelectorAll('#checkTable tbody tr');
            var diffs = [];
            for (var i = 0; i < rows.length; i++) {
                var r = rows[i];
                var sku = r.children[0].textContent.trim();
                var name = r.children[1].textContent.trim();
                var sysQty = parseInt(r.children[2].textContent) || 0;
                var realQty = parseInt(r.children[3].querySelector('input').value) || 0;
                var diff = realQty - sysQty;
                var reason = r.children[5].querySelector('select').value;
                diffs.push({ sku: sku, name: name, sysQty: sysQty, realQty: realQty, diff: diff, reason: reason });
            }
            return diffs;
        }

        function submitForReview() {
            if (!isLocked) { showToast('请先锁仓再提交盘点结果！', 'warning'); return; }
            var diffs = collectDiffRows();
            var noReason = diffs.filter(function(d) { return d.diff !== 0 && !d.reason; });
            if (noReason.length > 0) {
                showToast('以下 SKU 有差异但未填写原因：' + noReason.map(function(d) { return d.sku + '(' + (d.diff>0?'+':'') + d.diff + ')'; }).join('，'), 'warning');
                return;
            }
            // Show password modal
            document.getElementById('pwdModal').classList.add('show');
            document.getElementById('pwdInput').value = '';
            document.getElementById('pwdInput').focus();
        }

        function closePwdModal() {
            document.getElementById('pwdModal').classList.remove('show');
        }

        function confirmPassword() {
            var pwd = document.getElementById('pwdInput').value;
            if (pwd !== '123456') {
                showToast('❌ 密码错误，提交失败！', 'error');
                document.getElementById('pwdInput').value = '';
                document.getElementById('pwdInput').focus();
                return;
            }
            closePwdModal();

            var diffs = collectDiffRows();
            // Save to checkHistory
            var history = JSON.parse(localStorage.getItem('checkHistory') || '[]');
            history.unshift({
                date: new Date().toLocaleString(),
                approver: '林总',
                items: diffs
            });
            localStorage.setItem('checkHistory', JSON.stringify(history));

            // Update stockData (SKUs match directly)
            var stockData = JSON.parse(localStorage.getItem('stockData') || '[]');
            for (var i = 0; i < diffs.length; i++) {
                var d = diffs[i];
                for (var j = 0; j < stockData.length; j++) {
                    if (stockData[j].sku === d.sku) {
                        stockData[j].warehouse_qty = d.realQty;
                        stockData[j].difference = stockData[j].website_qty - d.realQty;
                        break;
                    }
                }
            }
            localStorage.setItem('stockData', JSON.stringify(stockData));

            var summary = diffs.map(function(d) { return d.sku + ' ' + d.name + '：' + d.sysQty + '→' + d.realQty + ' (' + (d.diff>0?'+':'') + d.diff + ') ' + (d.reason||'无'); }).join('\n');
            addAuditLog('库存调整', '月度盘点差异调整（主管复核通过）', '-', summary);
            showToast('✅ 盘点结果已提交，主管复核通过！', 'success');
        }

        renderCheckTable();
    </script>
</body>
</html>
