<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>库存修正 - 卢米纳电子</title>
    <link rel="stylesheet" href="../../css/common.css">
    <link rel="stylesheet" href="css/mobile-common.css">
    <style>
        .qty-row-mobile { display: flex; gap: 12px; align-items: center; }
        .qty-row-mobile button { width: 52px; height: 48px; border: 2px solid var(--border-light); border-radius: 8px; font-size: 24px; font-weight: bold; cursor: pointer; background: var(--bg-main); font-family: var(--font-stack); }
        .qty-row-mobile button:active { background: var(--bg-second); }
        .qty-row-mobile input { flex: 1; text-align: center; font-size: 22px; font-weight: bold; }
        .stock-preview-mobile { padding: 12px 16px; background: var(--bg-second); border-radius: 8px; font-size: 13px; color: var(--text-second); margin-top: 8px; line-height: 1.6; }
        .submit-btn-danger { width: 100%; min-height: 52px; background: var(--danger-color); color: #fff; border: none; border-radius: var(--radius-md); font-size: 17px; font-weight: 600; font-family: var(--font-stack); cursor: pointer; margin-top: 8px; }
        .result-hint-mobile { font-size: 13px; color: var(--text-second); margin-top: 6px; }
    </style>
</head>
<body>
    <div class="pc-screen">
        <div class="mobile-top-bar">
            <div class="top-left">
                <a href="index.html" class="back-link-mobile" title="返回工作台" data-icon="chevron-left" data-icon-size="24"></a>
                <span class="top-title">库存修正</span>
            </div>
            <div class="top-right">
                <button class="eye-mobile-btn" id="eyeMobileBtn" onclick="toggleEyeMobile()" title="护眼模式"></button>
            </div>
        </div>

        <div class="page-content">
            <div class="form-group-mobile">
                <label class="form-label-mobile"><span class="required">*</span> 选择 SKU</label>
                <select class="form-select-mobile" id="skuSelect" onchange="onSkuChange()">
                    <option value="">请选择商品</option>
                    <option value="SPK-A100">SPK-A100 — 智能音箱 Pro (仓库:8)</option>
                    <option value="SPK-B200">SPK-B200 — 监控摄像头 4K (仓库:11)</option>
                    <option value="SPK-C300">SPK-C300 — 智能门锁 E1 (仓库:3)</option>
                    <option value="SPK-D400">SPK-D400 — 无线耳机 T3 (仓库:17)</option>
                    <option value="SPK-E500">SPK-E500 — 智能手表 S2 (仓库:14)</option>
                </select>
                <div class="stock-preview-mobile" id="stockPreview"></div>
            </div>

            <div class="form-group-mobile">
                <label class="form-label-mobile"><span class="required">*</span> 修正数量（正=入库，负=出库）</label>
                <div class="qty-row-mobile">
                    <button onclick="adjustQty(-1)">−</button>
                    <input type="number" class="form-input-mobile" id="corrQty" value="0" oninput="previewResult()">
                    <button onclick="adjustQty(1)">+</button>
                </div>
                <div class="result-hint-mobile" id="resultHint"></div>
            </div>

            <div class="form-group-mobile">
                <label class="form-label-mobile"><span class="required">*</span> 修正原因</label>
                <select class="form-select-mobile" id="corrReason">
                    <option value="">请选择原因</option>
                    <option value="破损">破损</option>
                    <option value="丢失">丢失</option>
                    <option value="调拨">调拨</option>
                    <option value="其他">其他</option>
                </select>
            </div>

            <div class="form-group-mobile">
                <label class="form-label-mobile">备注（选填）</label>
                <textarea class="form-textarea-mobile" id="corrNote" placeholder="补充说明"></textarea>
            </div>

            <button class="submit-btn-danger" onclick="submitCorrection()">确认修正</button>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script src="../../js/api.js"></script>
    <script src="js/mobile-icons.js"></script>
    <script src="js/mobile-nav.js"></script>
    <script src="js/mobile-toast.js"></script>
    <script>
        (function() {
            var isEye = localStorage.getItem('eyeProtect') === 'true';
            var btn = document.getElementById('eyeMobileBtn');
            if (btn && window.renderMobileIcon) btn.innerHTML = window.renderMobileIcon(isEye ? 'sun' : 'moon', '20');
        })();

        var PRODUCT_LABELS = {
            'SPK-A100': '智能音箱 Pro', 'SPK-B200': '监控摄像头 4K', 'SPK-C300': '智能门锁 E1',
            'SPK-D400': '无线耳机 T3', 'SPK-E500': '智能手表 S2'
        };

        function getStock(sku) {
            var data = JSON.parse(localStorage.getItem('stockData') || '[]');
            return data.find(function(s) { return s.sku === sku; });
        }

        function onSkuChange() {
            var sku = document.getElementById('skuSelect').value;
            var preview = document.getElementById('stockPreview');
            if (!sku) { preview.innerHTML = ''; return; }
            var s = getStock(sku);
            if (s) {
                preview.innerHTML = '当前仓库：<strong>' + s.warehouse_qty + '</strong> | 线上：<strong>' + s.website_qty + '</strong> | 差异：<strong style="color:' + (s.difference !== 0 ? 'var(--danger-color)' : 'var(--success-color)') + ';">' + s.difference + '</strong>';
            }
            previewResult();
        }

        function adjustQty(delta) {
            var input = document.getElementById('corrQty');
            input.value = (parseInt(input.value) || 0) + delta;
            previewResult();
        }

        function previewResult() {
            var sku = document.getElementById('skuSelect').value;
            var qty = parseInt(document.getElementById('corrQty').value) || 0;
            var hint = document.getElementById('resultHint');
            if (!sku || qty === 0) { hint.innerText = ''; return; }
            var s = getStock(sku);
            if (s) {
                var after = s.warehouse_qty + qty;
                hint.innerText = '修正后仓库库存：' + after + '（' + s.warehouse_qty + ' → ' + after + '）';
                hint.style.color = after < 0 ? 'var(--danger-color)' : 'var(--text-second)';
            }
        }

        function submitCorrection() {
            var sku = document.getElementById('skuSelect').value;
            var qty = parseInt(document.getElementById('corrQty').value) || 0;
            var reason = document.getElementById('corrReason').value;
            var note = document.getElementById('corrNote').value.trim();

            if (!sku) { alert('请选择 SKU！'); return; }
            if (qty === 0) { alert('修正数量不能为 0！'); return; }
            if (!reason) { alert('请选择修正原因！'); return; }

            // Call backend API
            var typeMap = { '破损': 'correct_damage', '丢失': 'correct_loss', '调拨': 'correct_transfer', '其他': 'correct_transfer' };
            API.adjustInventory({ sku: sku, quantity_change: qty, type: typeMap[reason] || 'correct_transfer', remark: note, operator: '王主管' }).catch(function(){});
            var stockData = JSON.parse(localStorage.getItem('stockData') || '[]');
            var name = PRODUCT_LABELS[sku] || sku;
            var oldQty = 0, newQty = 0;
            for (var i = 0; i < stockData.length; i++) {
                if (stockData[i].sku === sku) {
                    oldQty = stockData[i].warehouse_qty;
                    stockData[i].warehouse_qty += qty;
                    if (stockData[i].warehouse_qty < 0) stockData[i].warehouse_qty = 0;
                    stockData[i].difference = stockData[i].website_qty - stockData[i].warehouse_qty;
                    newQty = stockData[i].warehouse_qty;
                    break;
                }
            }
            localStorage.setItem('stockData', JSON.stringify(stockData));

            var sign = qty > 0 ? '+' : '';
            addAuditLog('库存修正', '修正 SKU：' + sku + ' ' + name + ' [' + reason + ']' + (note ? ' (' + note + ')' : ''),
                '仓库：' + oldQty, '仓库：' + newQty + '（' + sign + qty + '）');

            alert('✅ 库存修正完成！\n\n' + sku + ' ' + name + '\n' + reason + '\n仓库：' + oldQty + ' → ' + newQty + '（' + sign + qty + '）');

            document.getElementById('corrQty').value = '0';
            document.getElementById('corrReason').value = '';
            document.getElementById('corrNote').value = '';
            document.getElementById('resultHint').innerText = '';
            onSkuChange();
        }
    </script>
</body>
</html>
