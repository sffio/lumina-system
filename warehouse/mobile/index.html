<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>仓库工作台 - 卢米纳电子</title>
    <link rel="stylesheet" href="../../css/common.css">
    <link rel="stylesheet" href="css/mobile-common.css">
    <style>
        .check-reminder-mobile { padding: 14px 16px; background: #fff3e0; border-radius: var(--radius-md); margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; gap: 12px; font-size: 13px; color: #e65100; font-weight: 500; }
        .check-reminder-mobile button { min-height: 36px; padding: 0 14px; background: var(--warning-color); color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; font-family: var(--font-stack); }
        .alert-none-mobile { text-align: center; padding: 24px; color: var(--success-color); font-size: 15px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="pc-screen">
        <div class="mobile-top-bar">
            <div class="top-left">
                <a href="../../index.html" class="back-link-mobile" title="返回登录" data-icon="chevron-left" data-icon-size="24"></a>
                <span class="top-title">仓库工作台</span>
            </div>
            <div class="top-right">
                <button class="eye-mobile-btn" id="eyeMobileBtn" onclick="toggleEyeMobile()" title="护眼模式"></button>
            </div>
        </div>
        <div class="page-content">
            <div class="user-subtitle">王主管 | <span id="currentDate"></span></div>
            <div class="metric-grid-mobile" id="metricGrid"><div class="metric-card-mobile"><div class="metric-label">加载中...</div></div></div>
            <div class="quick-menu-mobile">
                <button class="menu-btn-mobile" onclick="window.location.href='delivery.html'"><span data-icon="package" data-icon-size="22"></span> 待发货订单</button>
                <button class="menu-btn-mobile" onclick="window.location.href='refund.html'"><span data-icon="refresh" data-icon-size="22"></span> 退货录入</button>
                <button class="menu-btn-mobile warning" onclick="window.location.href='check.html'"><span data-icon="clipboard" data-icon-size="22"></span> 月度盘点</button>
                <button class="menu-btn-mobile danger" onclick="window.location.href='offline.html'"><span data-icon="cloud-off" data-icon-size="22"></span> 紧急离线模式</button>
                <button class="menu-btn-mobile" style="grid-column:1/-1;background:var(--primary-color);color:#fff;border:none;" onclick="window.location.href='stock.html'"><span data-icon="database" data-icon-size="22"></span> 库存总览</button>
                <button class="menu-btn-mobile danger" style="grid-column:1/-1;" onclick="window.location.href='correct.html'"><span data-icon="alert-triangle" data-icon-size="22"></span> 库存修正</button>
            </div>
            <div id="checkReminder"></div>
            <div class="section-header-mobile"><span class="section-title">库存预警</span><button class="export-btn-sm" onclick="exportToExcel('stockTable','库存预警表')">导出Excel</button></div>
            <div class="responsive-table"><table id="stockTable"><thead><tr><th>SKU</th><th>品名</th><th>仓库库存</th><th>线上库存</th><th>差异</th><th>状态</th></tr></thead><tbody id="alertBody"></tbody></table></div>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script src="../../js/api.js"></script>
    <script src="js/mobile-icons.js"></script>
    <script src="js/mobile-nav.js"></script>
    <script>
        (function(){var e=localStorage.getItem('eyeProtect')==='true';var b=document.getElementById('eyeMobileBtn');if(b&&window.renderMobileIcon)b.innerHTML=window.renderMobileIcon(e?'sun':'moon','20');})();
        var today=new Date();
        document.getElementById('currentDate').innerText=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

        var PRODUCT_NAMES={'SPK-A100':'智能音箱 Pro','SPK-B200':'监控摄像头 4K','SPK-C300':'智能门锁 E1','SPK-D400':'无线耳机 T3','SPK-E500':'智能手表 S2'};

        var API_BASE='/api/v1/warehouse';
        function apiGet(p){return fetch(API_BASE+p).then(function(r){return r.json();}).then(function(d){return d.data;});}

        // 串行加载：先库存和订单，渲染；再退货和盘点
        console.log('[加载] 开始从后端拉取数据...');
        apiGet('/inventory').then(function(inv){
            localStorage.setItem('stockData',JSON.stringify(inv));
            return apiGet('/orders/pending');
        }).then(function(orders){
            var om={};var ex=JSON.parse(localStorage.getItem('orderData')||'[]');
            ex.forEach(function(o){om[o.id]=o;});
            orders.forEach(function(o){om[o.id]={id:o.id,customer:o.customer_name,amount:o.total_amount,orderDate:o.order_date,dueDate:o.due_date,status:o.status==='pending_shipment'?'待发货':o.status,items:o.items};});
            localStorage.setItem('orderData',JSON.stringify(Object.values(om)));
            return apiGet('/returns');
        }).then(function(ret){
            localStorage.setItem('refundData',JSON.stringify(ret.map(function(r){return{id:r.id,orderId:r.order_id,sn:r.sn_code,customer:'',phone:'',account:'',bank:'',amount:0,product:r.sku||'',quality:r.quality_result,operator:r.operator,status:r.status==='pending_check'?'待审核':r.status,createTime:r.created_at};})));
            return apiGet('/check/history');
        }).then(function(ch){
            localStorage.setItem('checkHistory',JSON.stringify(ch));
            console.log('[加载] 全部数据就绪');
            renderAll();
        }).catch(function(e){
            console.warn('[加载] 后端不可用，使用本地缓存:',e.message);
            renderAll();
        });

        function renderAll(){
            var orders=JSON.parse(localStorage.getItem('orderData')||'[]');
            var po=orders.filter(function(o){return o.status==='待发货';}).length;
            var oo=orders.filter(function(o){return o.status==='待发货'&&o.dueDate<'2026-06-05';}).length;
            var refunds=JSON.parse(localStorage.getItem('refundData')||'[]');
            var pr=refunds.filter(function(r){return r.status==='待审核';}).length;
            document.getElementById('metricGrid').innerHTML=
                '<div class="metric-card-mobile"><div class="metric-label">今日待发货B2B订单</div><div class="metric-value'+(po>0?' text-red':' text-green')+'">'+po+'</div><div class="metric-desc">'+(oo>0?oo+'笔超时':'全部正常')+'</div></div>'+
                '<div class="metric-card-mobile"><div class="metric-label">待处理退货</div><div class="metric-value'+(pr>0?' text-yellow':' text-green')+'">'+pr+'</div><div class="metric-desc">需财务审核处理</div></div>';

            var ch=JSON.parse(localStorage.getItem('checkHistory')||'[]');
            var tm=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0');
            if(!ch.some(function(h){return h.date&&h.date.indexOf(tm)!==-1;})){
                document.getElementById('checkReminder').innerHTML='<div class="check-reminder-mobile"><span>⚠ 本月暂无盘点记录</span><button onclick="window.location.href=\'check.html\'">前往盘点</button></div>';
            }

            var sd=JSON.parse(localStorage.getItem('stockData')||'[]');
            var al=sd.filter(function(s){return s.difference!==0||s.warehouse_qty<5;});
            var ah='';
            if(al.length===0){ah='<tr><td colspan="6" class="alert-none-mobile">所有商品库存正常</td></tr>';}
            else{for(var i=0;i<al.length;i++){var s=al[i];var n=PRODUCT_NAMES[s.sku]||s.sku;var d=s.difference||0;var st,sc;if(d>0){st='超卖';sc='red';}else if(d<0){st='待同步';sc='yellow';}else{st='低库存';sc='yellow';}var dc=d>0?'text-red':(d<0?'text-yellow':'text-yellow');ah+='<tr><td data-label="SKU">'+s.sku+'</td><td data-label="品名">'+n+'</td><td data-label="仓库库存"><span>'+s.warehouse_qty+'</span></td><td data-label="线上库存"><span>'+(s.website_qty||0)+'</span></td><td data-label="差异"><span class="'+dc+'">'+(d>0?'+':'')+d+'</span></td><td data-label="状态"><span class="status-tag-mobile '+sc+'">'+st+'</span></td></tr>';}}
            document.getElementById('alertBody').innerHTML=ah;
        }
    </script>
</body>
</html>
