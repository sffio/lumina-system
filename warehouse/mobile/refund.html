<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>退货录入 - 卢米纳电子</title>
    <link rel="stylesheet" href="../../css/common.css">
    <link rel="stylesheet" href="css/mobile-common.css">
    <style>
        /* QC buttons */
        .qc-group-mobile { display: flex; gap: 12px; }
        .qc-btn-mobile { flex: 1; min-height: 60px; border: 2px solid var(--border-light); border-radius: var(--radius-md); background: var(--bg-main); font-size: 17px; font-weight: 600; font-family: var(--font-stack); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all var(--transition-fast); }
        .qc-btn-mobile:active { transform: scale(0.97); }
        .qc-btn-mobile.selected-good { border-color: var(--success-color); background: var(--status-success-bg); color: var(--status-success-text); }
        .qc-btn-mobile.selected-bad  { border-color: var(--danger-color); background: var(--status-danger-bg); color: var(--status-danger-text); }

        /* Status flow */
        .status-flow-mobile { display: none; margin-bottom: 16px; padding: 16px; background: var(--bg-main); border-radius: var(--radius-md); box-shadow: var(--shadow-sm); }
        .status-flow-mobile.show { display: block; }
        .flow-title-mobile { text-align: center; font-size: 14px; font-weight: 600; color: var(--text-main); margin-bottom: 14px; }
        .flow-steps-mobile { display: flex; align-items: center; justify-content: center; }
        .flow-step-mobile { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .flow-dot-mobile { width: 32px; height: 32px; border-radius: 50%; background: #e0e0e0; color: #999; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; transition: all 0.3s; }
        .flow-step-mobile.done .flow-dot-mobile { background: var(--success-color); color: #fff; }
        .flow-step-mobile.active .flow-dot-mobile { background: var(--primary-color); color: #fff; box-shadow: 0 0 0 4px rgba(0,120,212,0.2); }
        .flow-label-mobile { font-size: 11px; color: #999; font-weight: 500; }
        .flow-step-mobile.done .flow-label-mobile { color: var(--success-color); font-weight: 600; }
        .flow-step-mobile.active .flow-label-mobile { color: var(--primary-color); font-weight: 600; }
        .flow-line-mobile { flex: 1; height: 2px; background: #e0e0e0; margin: 0 4px; margin-bottom: 16px; max-width: 50px; transition: background 0.3s; }
        .flow-line-mobile.done { background: var(--success-color); }
    </style>
</head>
<body>
    <div class="pc-screen">
        <div class="mobile-top-bar">
            <div class="top-left">
                <a href="index.html" class="back-link-mobile" title="返回工作台" data-icon="chevron-left" data-icon-size="24"></a>
                <span class="top-title">退货录入</span>
            </div>
            <div class="top-right">
                <button class="eye-mobile-btn" id="eyeMobileBtn" onclick="toggleEyeMobile()" title="护眼模式"></button>
            </div>
        </div>

        <div class="page-content">
            <!-- Status Flow (hidden until submit) -->
            <div class="status-flow-mobile" id="statusFlow">
                <div class="flow-title-mobile" id="flowTitle"></div>
                <div class="flow-steps-mobile">
                    <div class="flow-step-mobile" id="step1"><div class="flow-dot-mobile">1</div><div class="flow-label-mobile">待检</div></div>
                    <div class="flow-line-mobile" id="line1"></div>
                    <div class="flow-step-mobile" id="step2"><div class="flow-dot-mobile">2</div><div class="flow-label-mobile">质检完成</div></div>
                    <div class="flow-line-mobile" id="line2"></div>
                    <div class="flow-step-mobile" id="step3"><div class="flow-dot-mobile">3</div><div class="flow-label-mobile">已入库</div></div>
                </div>
            </div>

            <!-- SN码 -->
            <div class="form-group-mobile">
                <label class="form-label-mobile"><span class="required">*</span> SN码（对账必填）</label>
                <div class="input-group-mobile">
                    <div class="input-row">
                        <input type="text" class="form-input-mobile" id="snCode" placeholder="请扫码/手动输入SN码">
                    </div>
                    <div class="btn-row">
                        <button class="input-btn-mobile" onclick="scanCode()"><span data-icon="scan" data-icon-size="20"></span> 扫码录入</button>
                        <button class="input-btn-mobile voice" onclick="voiceInput()"><span data-icon="mic" data-icon-size="20"></span> 语音输入</button>
                    </div>
                </div>
            </div>

            <!-- 原订单号 -->
            <div class="form-group-mobile">
                <label class="form-label-mobile"><span class="required">*</span> 原订单号</label>
                <div class="input-group-mobile">
                    <div class="input-row">
                        <input type="text" class="form-input-mobile" id="orderId" placeholder="请输入或扫码原订单号">
                        <button class="input-btn-mobile" onclick="scanOrderId()" style="flex:none;min-width:100px;"><span data-icon="scan" data-icon-size="20"></span> 扫码</button>
                    </div>
                </div>
            </div>

            <!-- 退货原因 -->
            <div class="form-group-mobile">
                <label class="form-label-mobile"><span class="required">*</span> 退货原因</label>
                <select class="form-select-mobile" id="refundReason">
                    <option value="">请选择退货原因</option>
                    <option value="质量问题">质量问题</option>
                    <option value="7天无理由">7天无理由退货</option>
                    <option value="发错货">发错货</option>
                    <option value="其他">其他原因</option>
                </select>
            </div>

            <!-- 质检标记 -->
            <div class="form-group-mobile">
                <label class="form-label-mobile"><span class="required">*</span> 质检标记</label>
                <div class="qc-group-mobile">
                    <button class="qc-btn-mobile" id="qcGood" onclick="selectQuality('good')">✅ 可再次销售</button>
                    <button class="qc-btn-mobile" id="qcBad"  onclick="selectQuality('bad')">❌ 不良品</button>
                </div>
            </div>

            <!-- 备注 -->
            <div class="form-group-mobile">
                <label class="form-label-mobile">手写备注/补充说明（选填）</label>
                <textarea class="form-textarea-mobile" id="remark" placeholder="请输入补充说明"></textarea>
            </div>

            <!-- 提交 -->
            <button class="submit-btn-mobile" onclick="submitRefund()">提交退货录入</button>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script src="../../js/api.js"></script>
    <script src="js/mobile-icons.js"></script>
    <script src="js/mobile-nav.js"></script>
    <script src="js/mobile-scanner.js"></script>
    <script>
        (function() {
            var isEye = localStorage.getItem('eyeProtect') === 'true';
            var btn = document.getElementById('eyeMobileBtn');
            if (btn && window.renderMobileIcon) {
                btn.innerHTML = window.renderMobileIcon(isEye ? 'sun' : 'moon', '20');
            }
        })();

        var selectedQuality = null;

        var SN_SKU_MAP = {
            'SN20260510001': { sku: 'SPK-A100', name: '智能音箱 Pro' },
            'SN20260510002': { sku: 'SPK-B200', name: '监控摄像头 4K' }
        };

        function scanCode() {
            openScannerMobile(function(value) {
                document.getElementById('snCode').value = value;
            });
        }
        function voiceInput() {
            openVoiceMobile(function(value) {
                document.getElementById('snCode').value = value;
            });
        }
        function scanOrderId() {
            openScannerMobile(function(value) {
                document.getElementById('orderId').value = value;
            });
        }

        function selectQuality(q) {
            selectedQuality = q;
            var g = document.getElementById('qcGood');
            var b = document.getElementById('qcBad');
            g.className = 'qc-btn-mobile' + (q === 'good' ? ' selected-good' : '');
            b.className = 'qc-btn-mobile' + (q === 'bad'  ? ' selected-bad'  : '');
        }

        function updateStockData(sn) {
            var mapping = SN_SKU_MAP[sn];
            if (!mapping) {
                var stockData = JSON.parse(localStorage.getItem('stockData') || '[]');
                if (stockData.length > 0) {
                    mapping = { sku: stockData[0].sku, name: '未知商品' };
                } else {
                    return null;
                }
            }
            var stockData = JSON.parse(localStorage.getItem('stockData') || '[]');
            var found = false;
            for (var i = 0; i < stockData.length; i++) {
                if (stockData[i].sku === mapping.sku) {
                    stockData[i].warehouse_qty += 1;
                    stockData[i].difference = stockData[i].website_qty - stockData[i].warehouse_qty;
                    found = true;
                    break;
                }
            }
            localStorage.setItem('stockData', JSON.stringify(stockData));
            return { found: found, sku: mapping.sku, name: mapping.name };
        }

        function showStatusFlow(sn, qualityLabel) {
            var flow = document.getElementById('statusFlow');
            flow.classList.add('show');
            document.getElementById('flowTitle').innerText = '退货单 ' + sn + ' — ' + qualityLabel;
            document.getElementById('step1').className = 'flow-step-mobile done';
            document.getElementById('line1').className = 'flow-line-mobile done';
            document.getElementById('step2').className = 'flow-step-mobile done';
            document.getElementById('line2').className = 'flow-line-mobile done';
            document.getElementById('step3').className = 'flow-step-mobile active';
            document.getElementById('step3').querySelector('.flow-dot-mobile').innerText = '✓';
        }

        function submitRefund() {
            var sn = document.getElementById('snCode').value;
            var orderId = document.getElementById('orderId').value;
            var reason = document.getElementById('refundReason').value;
            var remark = document.getElementById('remark').value;

            if (!sn || !orderId || !reason) {
                showToast('请填写所有必填项！', 'warning');
                return;
            }
            if (!selectedQuality) {
                showToast('请选择质检标记！', 'warning');
                return;
            }

            var qualityLabel = selectedQuality === 'good' ? '可再次销售' : '不良品';
            var isGood = selectedQuality === 'good';

            // Call backend API
            API.createReturn({ order_id: orderId, sn_code: sn, reason: reason, remark: remark, operator: '王主管' }).catch(function(){});
            var refunds = JSON.parse(localStorage.getItem('refundData') || '[]');
            var newRefund = {
                id: 'RT' + Date.now(),
                orderId: orderId,
                sn: sn,
                customer: '客户' + Math.floor(Math.random()*1000),
                phone: '138XXXX' + Math.floor(Math.random()*10000),
                account: '-',
                bank: '-',
                amount: 0,
                product: 'SPK100 智能音箱',
                quality: qualityLabel,
                operator: '王主管',
                status: '已入库',
                createTime: new Date().toLocaleString()
            };
            refunds.unshift(newRefund);
            localStorage.setItem('refundData', JSON.stringify(refunds));

            var stockResult = null;
            if (isGood) {
                stockResult = updateStockData(sn);
            }

            var stockMsg = '';
            if (stockResult && stockResult.found) {
                stockMsg = '，已恢复库存：' + stockResult.sku + ' ' + stockResult.name + ' +1';
            } else if (isGood) {
                stockMsg = '，库存恢复失败（未匹配SKU）';
            } else {
                stockMsg = '，不良品不入库';
            }
            addAuditLog('退货录入', '录入退货 ' + newRefund.id + ' [' + qualityLabel + ']', '-', 'SN码：' + sn + stockMsg);

            showStatusFlow(sn, qualityLabel);

            var resultMsg = '退货录入成功！质检结果：' + qualityLabel;
            if (stockResult && stockResult.found) {
                resultMsg += '\n良品已恢复库存：' + stockResult.sku + ' ' + stockResult.name + ' (+1)';
            }
            showToast(resultMsg, 'success');

            document.getElementById('snCode').value = '';
            document.getElementById('orderId').value = '';
            document.getElementById('refundReason').value = '';
            document.getElementById('remark').value = '';
            selectedQuality = null;
            document.getElementById('qcGood').className = 'qc-btn-mobile';
            document.getElementById('qcBad').className = 'qc-btn-mobile';
        }
    </script>
</body>
</html>
