<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>离线应急模式 - 卢米纳电子</title>
    <link rel="stylesheet" href="../../css/common.css">
    <link rel="stylesheet" href="css/mobile-common.css">
    <style>
        /* Modal overlay for mobile — fullscreen bottom sheet style */
        .modal-mask-mobile {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 999;
            align-items: flex-end; justify-content: center;
        }
        .modal-mask-mobile.show { display: flex; }
        .modal-sheet {
            width: 100%; max-width: 430px; max-height: 85vh; background: var(--bg-main);
            border-radius: 16px 16px 0 0; overflow-y: auto; display: flex; flex-direction: column;
        }
        .modal-sheet-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 20px; border-bottom: 1px solid var(--border-light);
        }
        .modal-sheet-title { font-size: 17px; font-weight: 600; color: var(--text-main); }
        .modal-sheet-close { width: 36px; height: 36px; border: none; background: none; font-size: 22px; color: #999; cursor: pointer; border-radius: 50%; }
        .modal-sheet-body { padding: 20px; }
        .modal-sheet-body .form-group-mobile { margin-bottom: 16px; }
        .modal-sheet-footer { padding: 12px 20px 20px; display: flex; gap: 12px; }
        .modal-sheet-footer button { flex: 1; min-height: 48px; border: none; border-radius: var(--radius-md); font-size: 16px; font-weight: 600; font-family: var(--font-stack); cursor: pointer; }
        .sheet-btn-cancel { background: var(--bg-second); color: var(--text-main); }
        .sheet-btn-confirm { background: var(--primary-color); color: #fff; }

        .queue-count-mobile { font-weight: 600; color: var(--primary-color); }
    </style>
</head>
<body>
    <div class="pc-screen">
        <div class="mobile-top-bar">
            <div class="top-left">
                <a href="index.html" class="back-link-mobile" title="返回工作台" data-icon="chevron-left" data-icon-size="24"></a>
                <span class="top-title">离线应急模式</span>
            </div>
            <div class="top-right">
                <span id="netStatus" style="font-size:12px;font-weight:600;padding:4px 10px;border-radius:12px;"></span>
            </div>
        </div>

        <div class="page-content">
            <div class="offline-status-bar">
                <span data-icon="wifi-off" data-icon-size="18"></span> 数据本地加密缓存 | 最后同步：<span id="lastSyncTime">2026-05-10 09:15</span>
            </div>

            <div class="offline-menu-grid">
                <button class="offline-menu-btn" onclick="openSheet('delivery')">
                    <span class="offline-icon" data-icon="package" data-icon-size="28"></span>
                    <span>离线发货录入</span>
                </button>
                <button class="offline-menu-btn" onclick="openSheet('refund')">
                    <span class="offline-icon" data-icon="refresh" data-icon-size="28"></span>
                    <span>离线退货录入</span>
                </button>
                <button class="offline-menu-btn" onclick="openSheet('check')">
                    <span class="offline-icon" data-icon="clipboard" data-icon-size="28"></span>
                    <span>离线盘点录入</span>
                </button>
            </div>

            <div class="cache-info-mobile">
                <h3><span data-icon="database" data-icon-size="18"></span> 当前本地缓存数据</h3>
                <div>发货记录：<span class="queue-count-mobile" id="deliveryCount">0</span> 条</div>
                <div>退货记录：<span class="queue-count-mobile" id="refundCount">0</span> 条</div>
                <div>盘点记录：<span class="queue-count-mobile" id="checkCount">0</span> 条</div>
                <div class="sync-warning"><span data-icon="alert-triangle" data-icon-size="16"></span> 所有数据已加密保存在本地，网络恢复后请立即同步</div>
            </div>

            <div class="action-stack">
                <button class="main-btn" style="background:var(--warning-color);" onclick="manualBackup()"><span data-icon="save" data-icon-size="20"></span> 手动缓存备份</button>
                <button class="main-btn" style="background:var(--success-color);" id="syncBtn" onclick="syncAll()"><span data-icon="upload" data-icon-size="20"></span> 一键同步数据</button>
                <button class="main-btn" style="background:var(--danger-color);" onclick="exitOffline()"><span data-icon="log-out" data-icon-size="20"></span> 退出离线模式</button>
            </div>
        </div>
    </div>

    <!-- ====== Modal: 离线发货 ====== -->
    <div class="modal-mask-mobile" id="sheetDelivery">
        <div class="modal-sheet">
            <div class="modal-sheet-header">
                <span class="modal-sheet-title">📦 离线发货录入</span>
                <button class="modal-sheet-close" onclick="closeSheet('delivery')">✕</button>
            </div>
            <div class="modal-sheet-body">
                <div class="form-group-mobile"><label class="form-label-mobile">* 客户名称</label><input type="text" class="form-input-mobile" id="delCustomer" placeholder="请输入客户名称"></div>
                <div class="form-group-mobile"><label class="form-label-mobile">* SKU</label><select class="form-select-mobile" id="delSku"><option value="">请选择商品</option><option value="SPK-A100">SPK-A100 智能音箱 Pro</option><option value="SPK-B200">SPK-B200 监控摄像头 4K</option><option value="SPK-C300">SPK-C300 智能门锁 E1</option><option value="SPK-D400">SPK-D400 无线耳机 T3</option><option value="SPK-E500">SPK-E500 智能手表 S2</option></select></div>
                <div class="form-group-mobile"><label class="form-label-mobile">* 数量</label><input type="number" class="form-input-mobile" id="delQty" placeholder="请输入发货数量" value="1"></div>
                <div class="form-group-mobile"><label class="form-label-mobile">备注</label><textarea class="form-textarea-mobile" id="delNote" placeholder="选填备注" style="min-height:60px;"></textarea></div>
            </div>
            <div class="modal-sheet-footer">
                <button class="sheet-btn-cancel" onclick="closeSheet('delivery')">取消</button>
                <button class="sheet-btn-confirm" onclick="submitOfflineDelivery()">保存到本地</button>
            </div>
        </div>
    </div>

    <!-- ====== Modal: 离线退货 ====== -->
    <div class="modal-mask-mobile" id="sheetRefund">
        <div class="modal-sheet">
            <div class="modal-sheet-header">
                <span class="modal-sheet-title">🔄 离线退货录入</span>
                <button class="modal-sheet-close" onclick="closeSheet('refund')">✕</button>
            </div>
            <div class="modal-sheet-body">
                <div class="form-group-mobile"><label class="form-label-mobile">* SN码</label><input type="text" class="form-input-mobile" id="offSnCode" placeholder="请输入SN码"></div>
                <div class="form-group-mobile"><label class="form-label-mobile">* 退货原因</label>
                    <select class="form-select-mobile" id="offRefundReason">
                        <option value="">请选择</option><option value="质量问题">质量问题</option><option value="7天无理由">7天无理由</option><option value="发错货">发错货</option><option value="其他">其他</option>
                    </select>
                </div>
            </div>
            <div class="modal-sheet-footer">
                <button class="sheet-btn-cancel" onclick="closeSheet('refund')">取消</button>
                <button class="sheet-btn-confirm" onclick="submitOfflineRefund()">保存到本地</button>
            </div>
        </div>
    </div>

    <!-- ====== Modal: 离线盘点 ====== -->
    <div class="modal-mask-mobile" id="sheetCheck">
        <div class="modal-sheet">
            <div class="modal-sheet-header">
                <span class="modal-sheet-title">📋 离线盘点录入</span>
                <button class="modal-sheet-close" onclick="closeSheet('check')">✕</button>
            </div>
            <div class="modal-sheet-body">
                <div class="form-group-mobile"><label class="form-label-mobile">* SKU</label><select class="form-select-mobile" id="offCheckSku"><option value="">请选择商品</option><option value="SPK-A100">SPK-A100 智能音箱 Pro</option><option value="SPK-B200">SPK-B200 监控摄像头 4K</option><option value="SPK-C300">SPK-C300 智能门锁 E1</option><option value="SPK-D400">SPK-D400 无线耳机 T3</option><option value="SPK-E500">SPK-E500 智能手表 S2</option></select></div>
                <div class="form-group-mobile"><label class="form-label-mobile">* 实盘数量</label><input type="number" class="form-input-mobile" id="offCheckQty" placeholder="请输入实盘数量" value="0"></div>
            </div>
            <div class="modal-sheet-footer">
                <button class="sheet-btn-cancel" onclick="closeSheet('check')">取消</button>
                <button class="sheet-btn-confirm" onclick="submitOfflineCheck()">保存到本地</button>
            </div>
        </div>
    </div>

    <script src="../../js/common.js"></script>
    <script src="../../js/api.js"></script>
    <script src="js/mobile-icons.js"></script>
    <script src="js/mobile-nav.js"></script>
    <script src="js/mobile-toast.js"></script>
    <script>
        var Q_DELIVERY = 'offlineDeliveryQueue';
        var Q_REFUND   = 'offlineRefundQueue';
        var Q_CHECK    = 'offlineCheckQueue';

        function openSheet(type) {
            document.getElementById('sheet' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('show');
        }
        function closeSheet(type) {
            document.getElementById('sheet' + type.charAt(0).toUpperCase() + type.slice(1)).classList.remove('show');
        }

        function refreshCacheInfo() {
            var d = JSON.parse(localStorage.getItem(Q_DELIVERY) || '[]');
            var r = JSON.parse(localStorage.getItem(Q_REFUND) || '[]');
            var c = JSON.parse(localStorage.getItem(Q_CHECK) || '[]');
            document.getElementById('deliveryCount').innerText = d.length;
            document.getElementById('refundCount').innerText = r.length;
            document.getElementById('checkCount').innerText = c.length;
            var total = d.length + r.length + c.length;
            document.getElementById('syncBtn').innerHTML = '<span data-icon="upload" data-icon-size="20"></span> ' + (total > 0 ? '一键同步数据 (' + total + ' 条)' : '一键同步数据');
        }

        function submitOfflineDelivery() {
            var customer = document.getElementById('delCustomer').value.trim();
            var sku = document.getElementById('delSku').value.trim();
            var qty = parseInt(document.getElementById('delQty').value) || 0;
            var note = document.getElementById('delNote').value.trim();
            if (!customer || !sku || qty <= 0) { alert('请填写完整信息！'); return; }

            var queue = JSON.parse(localStorage.getItem(Q_DELIVERY) || '[]');
            queue.push({ customer: customer, sku: sku, qty: qty, note: note, time: new Date().toLocaleString() });
            localStorage.setItem(Q_DELIVERY, JSON.stringify(queue));

            alert('离线发货已缓存！\n' + customer + ' / ' + sku + ' × ' + qty);
            document.getElementById('delCustomer').value = '';
            document.getElementById('delSku').value = '';
            document.getElementById('delQty').value = '1';
            document.getElementById('delNote').value = '';
            closeSheet('delivery');
            refreshCacheInfo();
        }

        function submitOfflineRefund() {
            var sn = document.getElementById('offSnCode').value.trim();
            var reason = document.getElementById('offRefundReason').value;
            if (!sn || !reason) { alert('请填写完整信息！'); return; }

            var queue = JSON.parse(localStorage.getItem(Q_REFUND) || '[]');
            queue.push({ sn: sn, reason: reason, time: new Date().toLocaleString() });
            localStorage.setItem(Q_REFUND, JSON.stringify(queue));

            alert('离线退货已缓存！\nSN：' + sn + ' / ' + reason);
            document.getElementById('offSnCode').value = '';
            document.getElementById('offRefundReason').value = '';
            closeSheet('refund');
            refreshCacheInfo();
        }

        function submitOfflineCheck() {
            var sku = document.getElementById('offCheckSku').value.trim();
            var qty = parseInt(document.getElementById('offCheckQty').value) || 0;
            if (!sku) { alert('请填写SKU！'); return; }

            var queue = JSON.parse(localStorage.getItem(Q_CHECK) || '[]');
            queue.push({ sku: sku, actualQty: qty, time: new Date().toLocaleString() });
            localStorage.setItem(Q_CHECK, JSON.stringify(queue));

            alert('离线盘点已缓存！\nSKU：' + sku + ' / 实盘：' + qty);
            document.getElementById('offCheckSku').value = '';
            document.getElementById('offCheckQty').value = '0';
            closeSheet('check');
            refreshCacheInfo();
        }

        function manualBackup() {
            var d = JSON.parse(localStorage.getItem(Q_DELIVERY) || '[]');
            var r = JSON.parse(localStorage.getItem(Q_REFUND) || '[]');
            var c = JSON.parse(localStorage.getItem(Q_CHECK) || '[]');
            alert('本地缓存已备份成功！\n发货' + d.length + ' / 退货' + r.length + ' / 盘点' + c.length);
        }

        function syncAll() {
            var dQueue = JSON.parse(localStorage.getItem(Q_DELIVERY) || '[]');
            var rQueue = JSON.parse(localStorage.getItem(Q_REFUND) || '[]');
            var cQueue = JSON.parse(localStorage.getItem(Q_CHECK) || '[]');
            var dCount = dQueue.length, rCount = rQueue.length, cCount = cQueue.length;
            var total = dCount + rCount + cCount;
            if (total === 0) { alert('没有待同步的数据'); return; }

            for (var i = 0; i < dQueue.length; i++) {
                var d = dQueue[i];
                addAuditLog('发货录入', '离线发货同步', '-', '客户：' + d.customer + ' / SKU：' + d.sku + ' × ' + d.qty + (d.note ? ' / ' + d.note : ''));
            }
            for (var j = 0; j < rQueue.length; j++) {
                var r = rQueue[j];
                var refunds = JSON.parse(localStorage.getItem('refundData') || '[]');
                refunds.unshift({
                    id: 'RT' + Date.now() + j, orderId: 'ORD-OFFLINE-' + Date.now(),
                    sn: r.sn, customer: '离线客户', phone: '-', account: '-', bank: '-',
                    amount: 0, product: '未知', quality: '离线退货',
                    operator: '王主管', status: '待审核', createTime: r.time
                });
                localStorage.setItem('refundData', JSON.stringify(refunds));
                addAuditLog('退货录入', '离线退货同步', '-', 'SN码：' + r.sn + ' / 原因：' + r.reason);
            }
            for (var k = 0; k < cQueue.length; k++) {
                var c = cQueue[k];
                // Update local
                var stockData = JSON.parse(localStorage.getItem('stockData') || '[]');
                var matched = false;
                for (var m = 0; m < stockData.length; m++) {
                    if (stockData[m].sku === c.sku) {
                        stockData[m].warehouse_qty = c.actualQty;
                        stockData[m].difference = stockData[m].website_qty - c.actualQty;
                        matched = true; break;
                    }
                }
                localStorage.setItem('stockData', JSON.stringify(stockData));
                // Call backend API
                fetch('/api/v1/warehouse/inventory/adjust', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ sku: c.sku, quantity_change: c.actualQty, type: 'check_adjust', operator: '王主管', remark: '离线盘点同步' }) }).catch(function(){});
                addAuditLog('库存调整', '离线盘点同步', '-', 'SKU：' + c.sku + ' / 实盘：' + c.actualQty + (matched ? ' (已更新)' : ' (未匹配)'));
            }

            localStorage.setItem(Q_DELIVERY, '[]');
            localStorage.setItem(Q_REFUND, '[]');
            localStorage.setItem(Q_CHECK, '[]');

            var now = new Date();
            document.getElementById('lastSyncTime').innerText = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

            refreshCacheInfo();
            alert('同步完成！\n发货' + dCount + '条 → 审计日志\n退货' + rCount + '条 → 退货记录\n盘点' + cCount + '条 → 库存数据\n队列已清空');
        }

        function exitOffline() {
            var d = JSON.parse(localStorage.getItem(Q_DELIVERY) || '[]');
            var r = JSON.parse(localStorage.getItem(Q_REFUND) || '[]');
            var c = JSON.parse(localStorage.getItem(Q_CHECK) || '[]');
            var total = d.length + r.length + c.length;
            if (total > 0) {
                if (!confirm('还有 ' + total + ' 条离线数据未同步（发货' + d.length + '/退货' + r.length + '/盘点' + c.length + '），退出后将丢失。\n\n确定退出？')) return;
            }
            window.location.href = 'index.html';
        }

        // Network detection
        function updateNetStatus() {
            var el = document.getElementById('netStatus');
            if (navigator.onLine) {
                el.textContent = '🟢 在线';
                el.style.background = '#e8f5e9'; el.style.color = '#2e7d32';
            } else {
                el.textContent = '🔴 离线中';
                el.style.background = '#ffebee'; el.style.color = '#c62828';
            }
        }
        updateNetStatus();
        window.addEventListener('online', updateNetStatus);
        window.addEventListener('offline', updateNetStatus);

        refreshCacheInfo();
    </script>
</body>
</html>
