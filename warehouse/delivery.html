<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B订单发货确认 - 卢米纳电子</title>
    <link rel="stylesheet" href="../css/common.css">
    <style>
        .nav-bar { height: 100px; background: var(--bg-main); border-bottom: 2px solid var(--border-color); display: flex; flex-direction: column; padding: 0 30px; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; height: 50px; border-bottom: 1px solid var(--bg-second); }
        .review-switch-wrap { height: 50px; display: flex; justify-content: space-between; align-items: center; }
        .switch-label { font-size: 19px; font-weight: bold; color: var(--text-main); }
        .review-switch { display: flex; align-items: center; gap: 15px; }
        .switch-status { font-size: 18px; font-weight: bold; }
        .switch-status.open { color: var(--success-color); }
        .switch-btn { width: 80px; height: 40px; background: #cccccc; border-radius: 40px; position: relative; cursor: pointer; border: 2px solid var(--border-color); }
        .switch-btn.open { background: var(--success-color); }
        .switch-dot { width: 34px; height: 34px; background: #ffffff; border-radius: 50%; position: absolute; top: 1px; left: 1px; transition: 0.3s; border: 1px solid var(--border-color); }
        .switch-btn.open .switch-dot { left: 43px; }
        .order-select-bar { padding: 12px 30px; display: flex; align-items: center; gap: 12px; background: #f0f4ff; border-bottom: 1px solid #c0d0f0; }
        .order-select-bar label { font-size: 15px; font-weight: bold; color: var(--text-main); white-space: nowrap; }
        .order-select-bar select { flex: 1; height: 40px; padding: 0 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px; background: var(--bg-main); }
        .order-info { margin: 15px 30px; background: var(--bg-main); border: 2px solid var(--border-color); border-radius: 8px; padding: 15px; font-size: 17px; line-height: 1.8; color: var(--text-main); font-weight: 500; }
        .review-status-tip { margin: 0 30px 15px; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; text-align: center; border: 3px solid; }
        .review-status-tip.wait { background: #fff8e8; border-color: var(--warning-color); color: var(--warning-color); }
        .detail-list { margin: 0 30px; background: var(--bg-main); border: 2px solid var(--border-color); border-radius: 4px; flex: 1; overflow-y: auto; }
        .list-header { display: grid; grid-template-columns: 1fr 2fr 1fr 1fr 1fr; background: var(--bg-second); padding: 12px 8px; font-weight: bold; border-bottom: 2px solid var(--border-color); font-size: 16px; color: var(--text-main); }
        .list-row { display: grid; grid-template-columns: 1fr 2fr 1fr 1fr 1fr; padding: 12px 8px; border-bottom: 1px solid var(--table-border); align-items: center; font-size: 15px; color: var(--text-main); font-weight: 500; }
        .scan-btn { height: 48px; background: var(--primary-color); color: #ffffff; border: 2px solid #003366; border-radius: 4px; font-size: 15px; font-weight: bold; cursor: pointer; }
        .action-area { padding: 20px 30px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .main-btn { width: 100%; height: 90px; border: 3px solid; border-radius: 8px; font-size: 26px; font-weight: bold; cursor: pointer; color: #fff; }
        .submit-btn { background: var(--primary-color); border-color: #003366; }
        .review-pass-btn { background: var(--success-color); border-color: #006600; }
        .cancel-btn { height: 50px; width: 150px; background: var(--bg-main); color: var(--text-main); border: 2px solid var(--border-color); border-radius: 4px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .back-btn { margin: 20px 30px; }
        .empty-msg { text-align: center; padding: 60px 30px; color: #999; font-size: 18px; display: none; }
    </style>
</head>
<body>
    <div class="pc-screen">
        <div class="nav-bar">
            <div class="nav-top">
                <a href="index.html" class="back-btn">← 返回首页</a>
                <span class="nav-title">B2B订单发货详情</span>
                <span style="padding:6px 14px;border-radius:4px;font-weight:bold;font-size:14px;" id="statusBadge">待发货</span>
            </div>
            <div class="review-switch-wrap">
                <span class="switch-label">库存扣减人工复核总开关</span>
                <div class="review-switch">
                    <span class="switch-status open" id="switchText">已开启</span>
                    <div class="switch-btn open" id="reviewSwitch" onclick="toggleReviewSwitch()"><div class="switch-dot"></div></div>
                </div>
            </div>
        </div>

        <div class="order-select-bar">
            <label>📋 待发货订单：</label>
            <select id="orderSelect" onchange="onOrderChange()"><option value="">-- 请选择订单 --</option></select>
        </div>

        <div id="deliveryContent" style="flex:1;display:none;flex-direction:column;">
            <div class="order-info" id="orderInfo"></div>
            <div class="review-status-tip wait" id="reviewStatusTip">待人工复核确认，复核通过后库存才会扣减</div>
            <div class="detail-list">
                <div class="list-header"><span>SKU</span><span>品名</span><span>下单数量</span><span>应发数量</span><span>操作</span></div>
                <div id="lineItems"></div>
            </div>
            <div class="action-area" id="actionArea">
                <button class="main-btn submit-btn" onclick="submitApply()">提交发货复核申请</button>
                <button class="cancel-btn" onclick="window.location.href='index.html'">取消</button>
            </div>
        </div>
        <div class="empty-msg" id="emptyMsg"></div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/scanner-voice.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/api.js"></script>
    <script>
        // Per-order state — fully replaced on every order switch
        var state = { order: null, applyStatus: 0, isReviewOpen: true };

        var ORDER_TO_STOCK_SKU = { 'SPK-100': 'SPK-A100', 'CAM-300': 'SPK-B200', 'MS-200': 'SPK-C300' };

        function initOrderSelect() {
            var orders = JSON.parse(localStorage.getItem('orderData') || '[]');
            var pending = orders.filter(function(o) { return o.status === '待发货'; });
            var sel = document.getElementById('orderSelect');
            for (var i = 0; i < pending.length; i++) {
                var opt = document.createElement('option');
                opt.value = pending[i].id;
                opt.textContent = pending[i].id + ' — ' + pending[i].customer + ' (¥' + (pending[i].amount/10000).toFixed(0) + '万)';
                sel.appendChild(opt);
            }
        }

        function showEmpty(msg) {
            document.getElementById('emptyMsg').innerText = msg || '请在上方选择待发货订单';
            document.getElementById('emptyMsg').style.display = 'block';
            document.getElementById('deliveryContent').style.display = 'none';
        }

        function onOrderChange() {
            state = { order: null, applyStatus: 0, isReviewOpen: true };
            var orderId = document.getElementById('orderSelect').value;
            if (!orderId) { showEmpty('请在上方选择待发货订单'); return; }
            var orders = JSON.parse(localStorage.getItem('orderData') || '[]');
            var order = orders.find(function(o) { return o.id === orderId; });
            if (!order) { showEmpty('订单未找到'); return; }
            state.order = order;

            document.getElementById('emptyMsg').style.display = 'none';
            document.getElementById('deliveryContent').style.display = 'flex';

            var itemsSummary = order.items.map(function(it) { return it.name + ' ×' + it.qty; }).join('，');
            document.getElementById('orderInfo').innerHTML =
                '<div>订单编号：' + order.id + '</div>' +
                '<div>客户名称：' + order.customer + '</div>' +
                '<div>签约日期：' + order.orderDate + '</div>' +
                '<div>总金额：' + order.amount + '元</div>' +
                '<div>要求发货时间：' + order.dueDate + '</div>' +
                '<div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--border-color);color:var(--primary-color);">📦 ' + itemsSummary + '</div>';

            var itemsHtml = '';
            for (var i = 0; i < order.items.length; i++) {
                var item = order.items[i];
                itemsHtml += '<div class="list-row"><span>' + item.sku + '</span><span>' + item.name + '</span><span>' + item.qty + '</span><span>' + item.qty + '</span>' +
                    '<button class="scan-btn" onclick="openScanner(function(v){ alert(\'已核对 SKU：' + item.sku + ' / 编码：' + v + '\'); })">扫码核对</button></div>';
            }
            document.getElementById('lineItems').innerHTML = itemsHtml;

            resetUI();
        }

        function resetUI() {
            state.applyStatus = 0;
            resetActionBtn();
            var tip = document.getElementById('reviewStatusTip');
            tip.className = 'review-status-tip wait';
            tip.style.background = ''; tip.style.borderColor = ''; tip.style.color = '';
            tip.innerText = '待人工复核确认，复核通过后库存才会扣减';
            state.isReviewOpen = true;
            document.getElementById('switchText').innerText = '已开启';
            document.getElementById('switchText').className = 'switch-status open';
            document.getElementById('reviewSwitch').classList.add('open');
            document.getElementById('statusBadge').textContent = '待发货';
            document.getElementById('statusBadge').style.background = 'var(--warning-color)';
            document.getElementById('statusBadge').style.color = '#fff';
        }

        function checkStock() {
            if (!state.order) return { ok: true, messages: [] };
            var stockData = JSON.parse(localStorage.getItem('stockData') || '[]');
            var messages = [];
            for (var i = 0; i < state.order.items.length; i++) {
                var item = state.order.items[i];
                var stockSku = ORDER_TO_STOCK_SKU[item.sku];
                if (!stockSku) continue;
                var stock = stockData.find(function(s) { return s.sku === stockSku; });
                if (stock && stock.warehouse_qty < item.qty) {
                    messages.push(item.sku + ' ' + item.name + '：需要 ' + item.qty + '，仓库仅 ' + stock.warehouse_qty);
                }
            }
            return { ok: messages.length === 0, messages: messages };
        }

        function toggleReviewSwitch() {
            state.isReviewOpen = !state.isReviewOpen;
            document.getElementById('reviewSwitch').classList.toggle('open', state.isReviewOpen);
            if (state.isReviewOpen) {
                document.getElementById('switchText').innerText = '已开启';
                document.getElementById('switchText').className = 'switch-status open';
                document.getElementById('reviewStatusTip').className = 'review-status-tip wait';
                document.getElementById('reviewStatusTip').innerText = '待人工复核确认，复核通过后库存才会扣减';
                state.applyStatus = 0; resetActionBtn();
            } else {
                document.getElementById('switchText').innerText = '已关闭';
                document.getElementById('switchText').className = 'switch-status';
                var tip = document.getElementById('reviewStatusTip');
                tip.className = 'review-status-tip'; tip.style.background = '#ffe8e8'; tip.style.borderColor = 'var(--danger-color)'; tip.style.color = 'var(--danger-color)';
                tip.innerText = '人工复核已关闭，确认发货将直接扣减库存';
                document.getElementById('actionArea').innerHTML =
                    '<button class="main-btn submit-btn" onclick="directSend()">确认发货（直接扣减库存）</button>' +
                    '<button class="cancel-btn" onclick="window.location.href=\'index.html\'">取消</button>';
            }
        }

        function submitApply() {
            if (state.applyStatus !== 0 || !state.order) return;
            state.applyStatus = 1;
            document.getElementById('reviewStatusTip').className = 'review-status-tip wait';
            document.getElementById('reviewStatusTip').innerText = '已提交申请，待人工复核确认';
            document.getElementById('actionArea').innerHTML =
                '<button class="main-btn review-pass-btn" onclick="reviewPass()">人工复核通过（确认扣减库存）</button>' +
                '<button class="cancel-btn" onclick="resetActionBtn()">取消</button>';
            addAuditLog('发货申请', '提交发货申请 ' + state.order.id, '-', '待复核');
        }

        function reviewPass() {
            if (state.applyStatus !== 1 || !state.order) return;
            var stockResult = checkStock();
            if (!stockResult.ok) { showToast('⚠️ 库存不足，已通知采购！' + stockResult.messages.join('；'), 'warning'); return; }
            state.applyStatus = 2;
            // 调用后端 API 发货
            API.shipOrder(state.order.id, { operator: '王主管', mode: 'reviewed' }).catch(function(){});
            var orders = JSON.parse(localStorage.getItem('orderData') || '[]');
            for (var i = 0; i < orders.length; i++) { if (orders[i].id === state.order.id) { orders[i].status = '已发货'; break; } }
            localStorage.setItem('orderData', JSON.stringify(orders));
            var tip = document.getElementById('reviewStatusTip');
            tip.className = 'review-status-tip'; tip.style.background = '#e8f8e8'; tip.style.borderColor = 'var(--success-color)'; tip.style.color = 'var(--success-color)';
            tip.innerText = '人工复核已通过，库存已正式扣减';
            document.getElementById('actionArea').innerHTML = '<button class="main-btn review-pass-btn" disabled>复核已完成</button>';
            document.getElementById('statusBadge').textContent = '已发货';
            document.getElementById('statusBadge').style.background = 'var(--success-color)';
            addAuditLog('库存变动', '确认发货 ' + state.order.id, '-', '订单状态：已发货');
            showToast('发货成功！库存已扣减，状态已同步财务/销售端', 'success');
            refreshOrderSelect();
        }

        function directSend() {
            if (!state.order) return;
            var stockResult = checkStock();
            if (!stockResult.ok) { showToast('⚠️ 库存不足，已通知采购！\n' + stockResult.messages.join('；'), 'warning'); return; }
            var orders = JSON.parse(localStorage.getItem('orderData') || '[]');
            for (var i = 0; i < orders.length; i++) { if (orders[i].id === state.order.id) { orders[i].status = '已发货'; break; } }
            localStorage.setItem('orderData', JSON.stringify(orders));
            document.getElementById('statusBadge').textContent = '已发货';
            document.getElementById('statusBadge').style.background = 'var(--success-color)';
            addAuditLog('库存变动', '直接发货 ' + state.order.id, '-', '订单状态：已发货');
            showToast('发货成功！库存已直接扣减', 'success');
            refreshOrderSelect();
        }

        function resetActionBtn() {
            state.applyStatus = 0;
            document.getElementById('actionArea').innerHTML =
                '<button class="main-btn submit-btn" onclick="submitApply()">提交发货复核申请</button>' +
                '<button class="cancel-btn" onclick="window.location.href=\'index.html\'">取消</button>';
        }

        function refreshOrderSelect() {
            var sel = document.getElementById('orderSelect');
            sel.innerHTML = '<option value="">-- 请选择订单 --</option>';
            initOrderSelect();
            if (sel.options.length <= 1) {
                state = { order: null, applyStatus: 0, isReviewOpen: true };
                showEmpty('暂无待发货订单');
            } else {
                sel.selectedIndex = 1;
                onOrderChange();
            }
        }

        initOrderSelect();
        var sel = document.getElementById('orderSelect');
        if (sel.options.length > 1) { sel.selectedIndex = 1; onOrderChange(); }
    </script>
</body>
</html>
