<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>库存总览 - 卢米纳电子</title>
    <link rel="stylesheet" href="../css/common.css">
    <style>
        /* ---- Excel-style table enhancements ---- */
        .stock-section {
            margin: 0 30px 15px;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .stock-section.history {
            flex: 0 0 auto;
            max-height: 280px;
        }
        .stock-section.current {
            flex: 1;
        }
        /* Alternating row colors */
        .excel-table tbody tr:nth-child(even) {
            background: #f8f9fa;
        }
        .excel-table tbody tr:nth-child(odd) {
            background: #ffffff;
        }
        .excel-table tbody tr:hover {
            background: #e8f0fe;
        }
        /* Number columns right-aligned */
        .num-cell {
            text-align: right;
            font-variant-numeric: tabular-nums;
            font-family: "Consolas", "Courier New", monospace;
            font-weight: 500;
        }
        /* Date/time column */
        .time-cell {
            white-space: nowrap;
            font-size: 13px;
            color: var(--text-second);
        }
        /* Status badge in table */
        .stock-status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .stock-status.oversold {
            background: #ffebee;
            color: var(--danger-color);
        }
        .stock-status.low {
            background: #fff3e0;
            color: var(--warning-color);
        }
        .stock-status.normal {
            background: #e8f5e9;
            color: var(--success-color);
        }
        .stock-status.pending {
            background: #fff3e0;
            color: var(--warning-color);
        }
        /* Empty state */
        .empty-row td {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 15px;
        }
        /* Summary bar */
        .stock-summary {
            padding: 10px 16px;
            background: var(--bg-second);
            border-top: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--text-second);
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        .stock-summary strong {
            color: var(--text-main);
        }
        .stock-summary .health-good { color: var(--success-color); font-weight: bold; }
        .stock-summary .health-warn { color: var(--warning-color); font-weight: bold; }
        .stock-summary .health-bad  { color: var(--danger-color); font-weight: bold; }
        /* Diff color scale — 3 levels */
        .diff-zero  { color: var(--success-color); font-weight: bold; }
        .diff-small { color: var(--warning-color); font-weight: bold; }
        .diff-large { color: var(--danger-color); font-weight: bold; }
        /* Health progress bar */
        .health-bar-wrap {
            display: flex; align-items: center; gap: 8px;
        }
        .health-bar {
            width: 80px; height: 8px; border-radius: 4px;
            background: #e0e0e0; overflow: hidden;
        }
        .health-bar-fill {
            height: 100%; border-radius: 4px;
            transition: width 0.4s ease;
        }
    </style>
</head>
<body>
    <div class="pc-screen">
        <!-- Top Navigation -->
        <div class="top-nav">
            <div class="nav-title">卢米纳电子库存与财务一体化系统</div>
            <div class="nav-menu">
                <div class="nav-item" onclick="window.location.href='index.html'">仓库工作台</div>
                <div class="nav-item" onclick="window.location.href='delivery.html'">发货管理</div>
                <div class="nav-item" onclick="window.location.href='refund.html'">退货录入</div>
                <div class="nav-item" onclick="window.location.href='check.html'">库存盘点</div>
                <div class="nav-item" onclick="window.location.href='offline.html'">离线模式</div>
                <div class="nav-item active">库存总览</div>
            </div>
            <div class="nav-right">
                <div class="eye-switch-wrap">
                    <span>护眼模式</span>
                    <div class="eye-switch" id="eyeSwitch" onclick="toggleEyeProtect()">
                        <div class="eye-dot"></div>
                    </div>
                </div>
                <div class="user-info">登录人：王主管 | <span id="currentDate"></span></div>
            </div>
        </div>

        <!-- 上半部分：库存变动记录 -->
        <div class="stock-section history">
            <div class="section-header">
                <span>📋 库存变动记录（从新到老）</span>
                <button class="filter-btn export" onclick="exportToExcel('historyTable', '库存变动记录')">导出Excel</button>
            </div>
            <div class="excel-table" style="flex:1;">
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th style="width:150px;">时间</th>
                            <th style="width:80px;">操作人</th>
                            <th style="width:90px;">类型</th>
                            <th>变动内容</th>
                            <th style="width:130px;">变动前</th>
                            <th style="width:130px;">变动后</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr class="empty-row"><td colspan="6">暂无库存变动记录</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 下半部分：当前全部商品库存 -->
        <div style="padding:0 30px 10px;text-align:right;">
                <button class="filter-btn" style="background:var(--danger-color);margin-right:0;" onclick="window.location.href='correct.html'">🔧 库存修正</button>
            </div>
            <div class="stock-section current">
            <div class="section-header">
                <span>📦 当前全部商品库存</span>
                <button class="filter-btn export" onclick="exportToExcel('currentStockTable', '当前商品库存')">导出Excel</button>
            </div>
            <div class="excel-table" style="flex:1;">
                <table id="currentStockTable">
                    <thead>
                        <tr>
                            <th style="width:110px;">SKU</th>
                            <th>品名</th>
                            <th style="width:100px;">仓库库存</th>
                            <th style="width:100px;">线上库存</th>
                            <th style="width:80px;">差异</th>
                            <th style="width:90px;">状态</th>
                        </tr>
                    </thead>
                    <tbody id="currentStockBody">
                        <tr class="empty-row"><td colspan="6">暂无库存数据</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="stock-summary" id="stockSummary"></div>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/api.js"></script>
    <script>
        // ---- 日期显示 ----
        var today = new Date();
        document.getElementById('currentDate').innerText =
            today.getFullYear() + '-' +
            String(today.getMonth() + 1).padStart(2, '0') + '-' +
            String(today.getDate()).padStart(2, '0');

        // ---- SKU → 产品名映射 ----
        var PRODUCT_NAMES = {
            'SPK-A100': '智能音箱 Pro',
            'SPK-B200': '监控摄像头 4K',
            'SPK-C300': '智能门锁 E1',
            'SPK-D400': '无线耳机 T3',
            'SPK-E500': '智能手表 S2'
        };

        // ---- 状态判断（difference = website_qty - warehouse_qty）----
        function getStockStatus(difference, warehouseQty) {
            if (difference === 0) return { text: '正常',   cls: 'normal' };
            if (difference > 0)  return { text: '超卖',   cls: 'oversold' };
            return { text: '待同步', cls: 'pending' };
        }

        // ====== 渲染库存变动历史 ======
        function renderHistory() {
            var allLogs = JSON.parse(localStorage.getItem('auditLogData') || '[]');
            // 筛选库存相关变动
            var inventoryTypes = ['库存变动', '库存调整'];
            var logs = allLogs.filter(function(l) {
                return inventoryTypes.indexOf(l.type) !== -1;
            });
            // 按时间降序（从新到老）
            logs.sort(function(a, b) {
                return (b.time || '').localeCompare(a.time || '');
            });

            var tbody = document.getElementById('historyBody');
            if (logs.length === 0) {
                tbody.innerHTML = '<tr class="empty-row"><td colspan="6">暂无库存变动记录</td></tr>';
                return;
            }

            var html = '';
            for (var i = 0; i < logs.length; i++) {
                var log = logs[i];
                html += '<tr>' +
                    '<td class="time-cell">' + (log.time || '-') + '</td>' +
                    '<td>' + (log.operator || '-') + '</td>' +
                    '<td><span style="color:var(--primary-color);font-weight:500;">' + (log.type || '-') + '</span></td>' +
                    '<td>' + (log.content || '-') + '</td>' +
                    '<td class="num-cell" style="color:var(--text-second);">' + (log.before || '-') + '</td>' +
                    '<td class="num-cell" style="color:var(--primary-color);">' + (log.after || '-') + '</td>' +
                    '</tr>';
            }
            tbody.innerHTML = html;
        }

        // ====== 渲染当前库存 ======
        function renderCurrentStock() {
            var stockData = JSON.parse(localStorage.getItem('stockData') || '[]');
            var tbody = document.getElementById('currentStockBody');

            if (stockData.length === 0) {
                tbody.innerHTML = '<tr class="empty-row"><td colspan="6">暂无库存数据</td></tr>';
                document.getElementById('stockSummary').innerHTML = '';
                return;
            }

            var totalWarehouse = 0, totalWebsite = 0, totalAbsDiff = 0;
            var oversoldCount = 0, pendingCount = 0, normalCount = 0;

            var html = '';
            for (var i = 0; i < stockData.length; i++) {
                var item = stockData[i];
                var name = PRODUCT_NAMES[item.sku] || item.sku;
                var diff = item.difference || 0;
                var absDiff = Math.abs(diff);
                var wQty = item.warehouse_qty || 0;
                var status = getStockStatus(diff, wQty);

                // 统计
                totalWarehouse += wQty;
                totalWebsite += (item.website_qty || 0);
                totalAbsDiff += absDiff;
                if (status.cls === 'oversold') oversoldCount++;
                else if (status.cls === 'pending') pendingCount++;
                else normalCount++;

                // 差异色阶（diff = website - warehouse）
                // diff>0=网站超卖(红), diff=0=同步(绿), diff<0=待同步(黄)
                var diffCls;
                if (diff === 0) diffCls = 'diff-zero';
                else if (diff > 0) diffCls = 'diff-large';
                else diffCls = 'diff-small';
                var diffPrefix = diff > 0 ? '+' : '';

                html += '<tr>' +
                    '<td style="font-weight:600;">' + (item.sku || '-') + '</td>' +
                    '<td>' + name + '</td>' +
                    '<td class="num-cell">' + wQty + '</td>' +
                    '<td class="num-cell">' + (item.website_qty || 0) + '</td>' +
                    '<td class="num-cell ' + diffCls + '">' + diffPrefix + diff + '</td>' +
                    '<td><span class="stock-status ' + status.cls + '">' + status.text + '</span></td>' +
                    '</tr>';
            }
            tbody.innerHTML = html;

            // 动态差异率 = 总绝对差异 / 仓库总量 * 100%
            var varianceRate = totalWarehouse > 0 ? (totalAbsDiff / totalWarehouse * 100) : 0;
            var rateCls = varianceRate <= 1 ? 'health-good' : (varianceRate <= 3 ? 'health-warn' : 'health-bad');
            var rateText = varianceRate.toFixed(1) + '%';

            // 三色分段条：绿=正常, 黄=待同步, 红=超卖
            var total = stockData.length;
            var normalPct  = Math.round(normalCount  / total * 100);
            var pendingPct = Math.round(pendingCount / total * 100);
            var oversoldPct = 100 - normalPct - pendingPct; // 确保100%

            // 汇总栏
            document.getElementById('stockSummary').innerHTML =
                '<span>商品：<strong>' + total + '</strong> 种</span>' +
                '<span>仓库总量：<strong>' + totalWarehouse + '</strong></span>' +
                '<span>线上总量：<strong>' + totalWebsite + '</strong></span>' +
                '<span>差异率：<strong class="' + rateCls + '">' + rateText + '</strong> <span style="font-size:11px;color:#999;">(红线≤3%)</span></span>' +
                '<span>正常：<strong style="color:var(--success-color);">' + normalCount + '</strong></span>' +
                '<span>待同步：<strong style="color:var(--warning-color);">' + pendingCount + '</strong></span>' +
                '<span>超卖：<strong style="color:var(--danger-color);">' + oversoldCount + '</strong></span>' +
                '<span class="health-bar-wrap">' +
                '<span class="health-bar" style="flex:1;display:flex;border-radius:4px;overflow:hidden;">' +
                (normalPct  > 0 ? '<span style="width:' + normalPct  + '%;background:var(--success-color);height:100%;"></span>' : '') +
                (pendingPct > 0 ? '<span style="width:' + pendingPct + '%;background:var(--warning-color);height:100%;"></span>' : '') +
                (oversoldPct > 0 ? '<span style="width:' + oversoldPct + '%;background:var(--danger-color);height:100%;"></span>' : '') +
                '</span></span>';
        }

        // ---- 初始化（先同步后端，再渲染）----
        syncFromBackend().then(function() {
            renderHistory();
            renderCurrentStock();
        });
    </script>
</body>
</html>
