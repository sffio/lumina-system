<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卢米纳电子库存与财务一体化系统</title>
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">卢米纳电子库存与财务一体化系统</h1>
            <p class="login-subtitle">第一阶段核心功能原型 V1.0</p>
            
            <div class="form-group">
                <label>账号</label>
                <input type="text" id="username" class="form-input" placeholder="请输入账号">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" class="form-input" placeholder="请输入密码" onkeydown="if(event.key==='Enter')login()">
            </div>
            
            <button class="login-btn" onclick="login()">登录系统</button>
            
            <div class="login-tip">
                演示账号：linzong / wangzhuguan / chenzongjian，密码均为 123456；离职禁用账号：lizhi / 123456
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script>
        const authMessage = localStorage.getItem('authMessage');
        if(authMessage) {
            alert(authMessage);
            localStorage.removeItem('authMessage');
        }

        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const result = loginWithPassword(username, password);
            if(!result.success) {
                alert(result.message);
                return;
            }

            // 初始化系统数据
            initSystemData();
            // 跳转到对应首页
            if(result.user.role === 'manager') {
                window.location.href = 'manager/index.html';
            } else if(result.user.role === 'warehouse') {
                window.location.href = 'warehouse/index.html';
            } else if(result.user.role === 'finance') {
                window.location.href = 'finance/index.html';
            }
        }
    </script>
</body>
</html>
