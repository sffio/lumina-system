<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEO运营看板 - 卢米纳电子</title>
    <link rel="stylesheet" href="../css/common.css">
    <style>
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px 30px;
        }
        .metric-card {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 18px 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .metric-title {
            font-size: 14px;
            color: var(--text-second);
            margin-bottom: 10px;
            font-weight: 500;
        }
        .metric-value {
            font-size: 32px;
            font-weight: bold;
            line-height: 1.2;
        }
        .metric-value.red { color: var(--danger-color); }
        .metric-value.yellow { color: var(--warning-color); }
        .metric-value.green { color: var(--success-color); }
        .metric-desc {
            font-size: 12px;
            margin-top: 5px;
            color: var(--text-second);
        }
        .urgent-btn-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 30px 20px;
        }
        .urgent-btn {
            height: 50px;
            background: var(--danger-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .main-content {
            display: flex;
            gap: 20px;
            padding: 0 30px 20px;
            flex: 1;
            overflow: hidden;
        }
        .section {
            flex: 1;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .todo-list {
            flex: 1;
            overflow-y: auto;
        }
        .todo-item {
            padding: 15px;
            border-bottom: 1px solid var(--table-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .todo-content {
            font-size: 15px;
            color: var(--text-main);
        }
        .todo-tag {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            margin-left: 8px;
        }
        .todo-tag.red { background: var(--danger-color); }
        .todo-tag.yellow { background: var(--warning-color); }
        .todo-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            color: #fff;
            font-weight: 500;
        }
        .todo-btn.danger { background: var(--danger-color); }
        .todo-btn.primary { background: var(--primary-color); }
    </style>
</head>
<body>
    <div class="pc-screen">
        <div class="top-nav">
            <div class="nav-title">卢米纳电子库存与财务一体化系统</div>
            <div class="nav-menu">
                <div class="nav-item active">CEO运营看板</div>
                <div class="nav-item" onclick="window.location.href='warning.html'">异常预警</div>
                <div class="nav-item" onclick="window.location.href='supervise.html'">决策督办</div>
                <div class="nav-item" onclick="window.location.href='order.html'">大客户订单</div>
            </div>
            <div class="nav-right">
                <div class="eye-switch-wrap">
                    <span>护眼模式</span>
                    <div class="eye-switch" id="eyeSwitch" onclick="toggleEyeProtect()">
                        <div class="eye-dot"></div>
                    </div>
                </div>
                <div class="user-info">登录人：林总 | <span id="currentDate"></span></div>
            </div>
        </div>

        <div class="metric-grid">
            <div class="metric-card">
                <div class="metric-title">今日超卖次数</div>
                <div class="metric-value green">0</div>
                <div class="metric-desc">目标：归零 | 连续3天无超卖</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">库存差异率</div>
                <div class="metric-value red">4.2%</div>
                <div class="metric-desc">审计红线：≤3% | 超合规红线</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">本月全渠道销售额</div>
                <div class="metric-value">187.6万</div>
                <div class="metric-desc">实时对接电商/仓库/销售系统</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">当日订单发货率</div>
                <div class="metric-value green">98.6%</div>
                <div class="metric-desc">当日达目标</div>
            </div>
        </div>

        <div class="urgent-btn-wrap">
            <button class="urgent-btn">【强制调货督办】</button>
            <button class="urgent-btn">【大客户紧急加单】</button>
        </div>

        <div class="main-content">
            <div class="section">
                <div class="section-header">
                    <span>异常预警</span>
                    <a href="warning.html" class="more-btn">查看全部</a>
                </div>
                <div class="todo-list">
                    <div class="todo-item">
                        <div class="todo-content">
                            库存差异率超审计红线 4.2%
                            <span class="todo-tag red">审计风险</span>
                        </div>
                        <button class="todo-btn danger">立即督办</button>
                    </div>
                    <div class="todo-item">
                        <div class="todo-content">
                            B2B订单超时未发货 华为技术
                            <span class="todo-tag red">超时2天</span>
                        </div>
                        <button class="todo-btn danger">立即催办</button>
                    </div>
                    <div class="todo-item">
                        <div class="todo-content">
                            销售部2笔B2B订单未按时录入
                            <span class="todo-tag yellow">违规</span>
                        </div>
                        <button class="todo-btn primary">催办录入</button>
                    </div>
                </div>
            </div>
            <div class="section">
                <div class="section-header">
                    <span>待处理事项</span>
                </div>
                <div class="todo-list">
                    <div class="todo-item">
                        <div class="todo-content">
                            退款审核：ORD20260428005 | 客户：张三
                            <span class="todo-tag red">超时1天</span>
                        </div>
                        <button class="todo-btn danger">立即审核</button>
                    </div>
                    <div class="todo-item">
                        <div class="todo-content">
                            应收款预警：华为技术有限公司 | 15万
                            <span class="todo-tag yellow">逾期15天</span>
                        </div>
                        <button class="todo-btn primary">查看详情</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script>
        // 自动填充当前日期
        const today = new Date();
        document.getElementById('currentDate').innerText = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    </script>
</body>
</html>
