<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>异常预警 - 卢米纳电子</title>
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-second: #f5f5f5;
            --text-main: #000000;
            --text-second: #333333;
            --border-color: #999999;
            --primary-color: #0078d4;
            --danger-color: #d93025;
            --warning-color: #f57c00;
            --success-color: #0f9d58;
            --table-border: #dddddd;
            --tab-bg: #ffffff;
            --tab-border: #dddddd;
        }
        
        .eye-protect {
            --bg-main: #f8f9f0;
            --bg-second: #f0f2e6;
            --text-main: #222222;
            --text-second: #444444;
            --border-color: #888888;
            --primary-color: #2b78b2;
            --danger-color: #c43a31;
            --warning-color: #e07020;
            --success-color: #2b8a50;
            --table-border: #cccccc;
            --tab-bg: #f8f9f0;
            --tab-border: #cccccc;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "SimHei", sans-serif;
        }
        
        body {
            background: #e5e5e5;
            transition: background 0.3s;
            padding-bottom: 55px;
            min-height: 100vh;
        }
        
        .phone-screen {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            margin: 0 auto;
            background: var(--bg-second);
            position: relative;
            overflow-x: hidden;
        }
        
        .top-nav {
            height: 50px;
            background: var(--primary-color);
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background 0.3s;
        }
        
        .nav-title {
            font-size: 16px;
            font-weight: bold;
        }
        
        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .eye-switch-wrap {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
        }
        
        .eye-switch {
            width: 40px;
            height: 20px;
            background: rgba(255,255,255,0.3);
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.5);
        }
        
        .eye-switch.active .eye-dot {
            left: 18px;
        }
        
        .eye-dot {
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 1px;
            left: 1px;
            transition: 0.3s;
        }
        
        .user-info {
            font-size: 12px;
            white-space: nowrap;
        }
        
        .filter-bar {
            padding: 10px 15px;
            background: var(--bg-main);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
        }
        
        .filter-btn.export {
            padding: 6px 12px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
        }
        
        .tab-bar {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding: 10px 15px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-main);
        }
        
        .tab-item {
            padding: 6px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-second);
            border: 1px solid var(--border-color);
            white-space: nowrap;
            transition: all 0.3s;
        }
        
        .tab-item.active {
            background: var(--primary-color);
            color: #fff;
            border-color: var(--primary-color);
        }
        
        .warning-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
        }
        
        .warning-card {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            transition: all 0.3s;
        }
        
        .warning-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        
        .warning-level {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            color: #fff;
        }
        
        .warning-level.highest { background: var(--danger-color); }
        .warning-level.high { background: var(--warning-color); }
        .warning-level.medium { background: var(--primary-color); }
        
        .warning-title {
            font-size: 15px;
            font-weight: bold;
            color: var(--text-main);
            flex: 1;
            margin-right: 10px;
        }
        
        .warning-content {
            font-size: 13px;
            color: var(--text-second);
            line-height: 1.5;
            margin-bottom: 10px;
        }
        
        .warning-footer {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .warning-info {
            font-size: 12px;
            color: var(--text-second);
        }
        
        .warning-btn {
            padding: 8px 0;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            color: #fff;
            font-weight: 500;
            width: 100%;
            text-align: center;
        }
        
        .warning-btn.danger { background: var(--danger-color); }
        .warning-btn.primary { background: var(--primary-color); }
        
        .bottom-tabbar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            height: 55px;
            background: var(--tab-bg);
            border-top: 1px solid var(--tab-border);
            display: flex;
            z-index: 999;
            transition: all 0.3s;
        }
        
        .tab-item-bottom {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: var(--text-second);
            cursor: pointer;
            transition: color 0.3s;
            text-decoration: none;
        }
        
        .tab-item-bottom.active {
            color: var(--primary-color);
        }
        
        .tab-icon {
            font-size: 20px;
            margin-bottom: 2px;
        }
        
        .empty-state {
            padding: 50px 20px;
            text-align: center;
            color: var(--text-second);
            font-size: 16px;
        }
        
        /* 异常详情弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .modal-content {
            background: var(--bg-main);
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-title {
            font-size: 16px;
            font-weight: bold;
        }
        
        .modal-close {
            font-size: 20px;
            cursor: pointer;
            color: var(--text-second);
        }
        
        .modal-body {
            padding: 15px;
        }
        
        .modal-footer {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }
        
        .modal-btn {
            flex: 1;
            height: 40px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .modal-btn.cancel {
            background: var(--bg-second);
            color: var(--text-main);
        }
        
        .modal-btn.confirm {
            background: var(--primary-color);
            color: #fff;
        }
        
        .detail-item {
            margin-bottom: 10px;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .detail-label {
            font-weight: bold;
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <div class="phone-screen">
        <div class="top-nav">
            <div class="nav-title">异常预警</div>
            <div class="nav-right">
                <div class="eye-switch-wrap">
                    <span>护眼</span>
                    <div class="eye-switch" id="eyeSwitch" onclick="toggleEyeProtect()">
                        <div class="eye-dot"></div>
                    </div>
                </div>
                <div class="user-info">林总 | <span id="currentDate"></span></div>
            </div>
        </div>

        <div class="filter-bar">
            <button class="filter-btn export" onclick="exportToExcel('warningTable', '异常预警详情')">导出Excel</button>
        </div>

        <div class="tab-bar">
            <div class="tab-item active" data-type="all">全部</div>
            <div class="tab-item" data-type="oversell">超卖风险</div>
            <div class="tab-item" data-type="audit">审计合规</div>
            <div class="tab-item" data-type="timeout">超时预警</div>
        </div>

        <div class="warning-list" id="warningList">
            <!-- 异常数据将从localStorage动态加载 -->
        </div>

        <table id="warningTable" style="display: none;">
            <thead>
                <tr>
                    <th>预警级别</th>
                    <th>预警标题</th>
                    <th>预警内容</th>
                    <th>责任部门</th>
                    <th>触发时间</th>
                </tr>
            </thead>
            <tbody id="warningTableBody">
                <!-- 导出数据将动态生成 -->
            </tbody>
        </table>
    </div>

    <div class="bottom-tabbar">
        <a href="index-mobile.html" class="tab-item-bottom">
            <div class="tab-icon">📊</div>
            <div>运营看板</div>
        </a>
        <a href="warning-mobile.html" class="tab-item-bottom active">
            <div class="tab-icon">⚠️</div>
            <div>异常预警</div>
        </a>
        <a href="supervise-mobile.html" class="tab-item-bottom">
            <div class="tab-icon">📋</div>
            <div>决策督办</div>
        </a>
        <a href="order-mobile.html" class="tab-item-bottom">
            <div class="tab-icon">📦</div>
            <div>大客户订单</div>
        </a>
    </div>

    <!-- 异常详情弹窗 -->
    <div class="modal-overlay" id="warningDetailModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="warningDetailTitle">异常详情</div>
                <div class="modal-close" onclick="closeWarningDetail()">×</div>
            </div>
            <div class="modal-body" id="warningDetailContent">
                <!-- 详情内容将动态加载 -->
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel" onclick="closeWarningDetail()">关闭</button>
                <button class="modal-btn confirm" onclick="handleWarning()">立即处理</button>
            </div>
        </div>
    </div>

    <script>
        const today = new Date();
        document.getElementById('currentDate').innerText = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

        // 当前选中的分类
        let currentType = 'all';
        // 当前选中的异常ID
        let currentWarningId = null;
        
        // 标签切换
        const tabs = document.querySelectorAll('.tab-bar .tab-item');
        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentType = this.dataset.type;
                loadWarningList();
            });
        });
        
        function toggleEyeProtect() {
            const html = document.documentElement;
            const switchEl = document.getElementById('eyeSwitch');
            let isEyeProtect = localStorage.getItem('eyeProtect') === 'true';
            isEyeProtect = !isEyeProtect;
            localStorage.setItem('eyeProtect', isEyeProtect);
            switchEl.classList.toggle('active', isEyeProtect);
            html.classList.toggle('eye-protect', isEyeProtect);
        }

        window.addEventListener('DOMContentLoaded', function() {
            const isEyeProtect = localStorage.getItem('eyeProtect') === 'true';
            const html = document.documentElement;
            const switchEl = document.getElementById('eyeSwitch');
            if(isEyeProtect) {
                html.classList.add('eye-protect');
                switchEl.classList.add('active');
            }
            
            // 初始化默认异常数据
            if(!localStorage.getItem('warningData')) {
                const defaultWarnings = [
                    {
                        id: 1,
                        title: "超卖风险预警",
                        content: "SKU: SPK100 智能音箱<br>前端可售库存显示异常，存在超卖风险<br>仓库实际库存：241件 | 网站显示库存：259件 | 差异：18件",
                        level: "highest",
                        type: "oversell",
                        department: "电商部+仓库部",
                        time: "2026-05-06 09:30"
                    },
                    {
                        id: 2,
                        title: "库存差异率超审计红线",
                        content: "当前差异率：4.2%<br>合规红线：≤3%<br>已连续7天超合规红线，7月审计前必须完成整改",
                        level: "high",
                        type: "audit",
                        department: "仓库部+财务部",
                        time: "2026-05-06 08:00"
                    },
                    {
                        id: 3,
                        title: "B2B订单超时未发货",
                        content: "客户：华为技术有限公司<br>订单编号：B2B20260401001<br>应发货日期：2026-05-04 | 已超时2天",
                        level: "high",
                        type: "timeout",
                        department: "仓库部 王主管",
                        time: "2026-05-04 08:00"
                    },
                    {
                        id: 4,
                        title: "退款申请超时",
                        content: "订单编号：ORD20260428005<br>客户：张三 | 退款金额：2999元<br>应审核日期：2026-05-05 | 已超时1天",
                        level: "medium",
                        type: "timeout",
                        department: "财务部 陈总监",
                        time: "2026-05-05 08:00"
                    }
                ];
                localStorage.setItem('warningData', JSON.stringify(defaultWarnings));
            }
            
            // 加载异常列表
            loadWarningList();
        });
        
        // 加载异常列表
        function loadWarningList() {
            const allWarnings = JSON.parse(localStorage.getItem('warningData') || '[]');
            const warningList = document.getElementById('warningList');
            
            // 根据当前分类过滤
            let filteredWarnings = allWarnings;
            if(currentType !== 'all') {
                filteredWarnings = allWarnings.filter(w => w.type === currentType);
            }
            
            if(filteredWarnings.length === 0) {
                if(currentType === 'all') {
                    warningList.innerHTML = '<div class="empty-state">很好，暂无任何异常！</div>';
                } else {
                    warningList.innerHTML = '<div class="empty-state">暂无</div>';
                }
                return;
            }
            
            let html = '';
            filteredWarnings.forEach(warning => {
                const levelClass = warning.level === 'highest' ? 'highest' : 
                                 warning.level === 'high' ? 'high' : 'medium';
                const btnClass = warning.level === 'highest' ? 'danger' : 'primary';
                const btnText = warning.level === 'highest' ? '立即处理' : '查看详情';
                
                html += `
                <div class="warning-card">
                    <div class="warning-header">
                        <span class="warning-title">${warning.title}</span>
                        <span class="warning-level ${levelClass}">${getLevelText(warning.level)}</span>
                    </div>
                    <div class="warning-content">
                        ${warning.content}
                    </div>
                    <div class="warning-footer">
                        <div class="warning-info">
                            责任部门：${warning.department} | 触发时间：${warning.time}
                        </div>
                        <button class="warning-btn ${btnClass}" onclick="openWarningDetail(${warning.id})">${btnText}</button>
                    </div>
                </div>
                `;
            });
            
            warningList.innerHTML = html;
            
            // 更新导出表格数据
            updateExportTable(filteredWarnings);
        }
        
        // 获取级别文本
        function getLevelText(level) {
            switch(level) {
                case 'highest': return '最高优先级';
                case 'high': return '高优先级';
                case 'medium': return '中优先级';
                default: return '低优先级';
            }
        }
        
        // 更新导出表格数据
        function updateExportTable(warnings) {
            const tableBody = document.getElementById('warningTableBody');
            let html = '';
            warnings.forEach(warning => {
                // 移除HTML标签
                const plainContent = warning.content.replace(/<br>/g, ' ');
                html += `
                <tr>
                    <td>${getLevelText(warning.level)}</td>
                    <td>${warning.title}</td>
                    <td>${plainContent}</td>
                    <td>${warning.department}</td>
                    <td>${warning.time}</td>
                </tr>
                `;
            });
            tableBody.innerHTML = html;
        }
        
        // 打开异常详情
        function openWarningDetail(id) {
            currentWarningId = id;
            const warnings = JSON.parse(localStorage.getItem('warningData') || '[]');
            const warning = warnings.find(w => w.id === id);
            
            if(!warning) return;
            
            document.getElementById('warningDetailTitle').innerText = warning.title;
            
            // 解析内容为详情项
            const contentLines = warning.content.split('<br>');
            let contentHtml = '';
            contentLines.forEach(line => {
                if(line.trim()) {
                    const parts = line.split('：');
                    if(parts.length === 2) {
                        contentHtml += `
                        <div class="detail-item">
                            <span class="detail-label">${parts[0]}：</span>
                            <span>${parts[1]}</span>
                        </div>
                        `;
                    } else {
                        contentHtml += `
                        <div class="detail-item">
                            <span>${line}</span>
                        </div>
                        `;
                    }
                }
            });
            
            // 添加额外信息
            contentHtml += `
            <div class="detail-item">
                <span class="detail-label">责任部门：</span>
                <span>${warning.department}</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">触发时间：</span>
                <span>${warning.time}</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">预警级别：</span>
                <span>${getLevelText(warning.level)}</span>
            </div>
            `;
            
            document.getElementById('warningDetailContent').innerHTML = contentHtml;
            document.getElementById('warningDetailModal').style.display = 'flex';
        }
        
        // 关闭异常详情
        function closeWarningDetail() {
            document.getElementById('warningDetailModal').style.display = 'none';
            currentWarningId = null;
        }
        
        // 处理异常
        function handleWarning() {
            if(!currentWarningId) return;
            
            // 从localStorage中删除该异常
            let warnings = JSON.parse(localStorage.getItem('warningData') || '[]');
            warnings = warnings.filter(w => w.id !== currentWarningId);
            localStorage.setItem('warningData', JSON.stringify(warnings));
            
            // 重新加载列表
            loadWarningList();
            
            // 关闭弹窗
            closeWarningDetail();
            alert('处理成功！该异常已标记为已解决');
        }
        
        // Excel导出
        function exportToExcel(tableId, fileName) {
            alert(`已触发导出：${fileName}.xlsx`);
        }
    </script>
</body>
</html>
