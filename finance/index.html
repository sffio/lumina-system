<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财务工作台 - 卢米纳电子</title>
    <link rel="stylesheet" href="../css/common.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px 30px;
        }
        .metric-card {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 18px 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .metric-title {
            font-size: 14px;
            color: var(--text-second);
            margin-bottom: 10px;
            font-weight: 500;
        }
        .metric-value {
            font-size: 32px;
            font-weight: bold;
            line-height: 1.2;
        }
        .metric-value.red { color: var(--danger-color); }
        .metric-value.yellow { color: var(--warning-color); }
        .metric-value.green { color: var(--success-color); }
        .metric-desc {
            font-size: 12px;
            margin-top: 5px;
            color: var(--text-second);
        }
        .main-content {
            display: flex;
            gap: 20px;
            padding: 0 30px 20px;
            flex: 1;
            overflow: hidden;
        }
        .todo-section {
            flex: 1.2;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .quick-section {
            flex: 0.8;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .todo-list {
            flex: 1;
            overflow-y: auto;
        }
        .todo-item {
            padding: 15px;
            border-bottom: 1px solid var(--table-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .todo-content {
            font-size: 15px;
            color: var(--text-main);
            line-height: 1.5;
        }
        .todo-tag {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            margin-left: 8px;
        }
        .todo-tag.red { background: var(--danger-color); }
        .todo-tag.yellow { background: var(--warning-color); }
        .todo-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            color: #fff;
            font-weight: 500;
            margin-left: 8px;
        }
        .todo-btn.primary { background: var(--primary-color); }
        .todo-btn.warning { background: var(--warning-color); }
        .todo-btn.danger { background: var(--danger-color); }
        .quick-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 15px;
        }
        .menu-item {
            height: 50px;
            background: var(--bg-second);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0 15px;
            display: flex;
            align-items: center;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        .menu-item:hover {
            background: var(--primary-color);
            color: #fff;
        }
        .menu-item.export {
            background: var(--success-color);
            color: #fff;
            border-color: var(--success-color);
        }
        .modal-mask {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal {
            background: var(--bg-main);
            border-radius: 8px;
            max-width: 700px;
            width: 90%;
            max-height: 80vh;
            overflow: auto;
        }
        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title { font-size: 18px; font-weight: bold; }
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-second);
        }
        .modal-body { padding: 20px; }
        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .modal-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .modal-btn.cancel { background: var(--bg-second); }
        .modal-btn.confirm { background: var(--primary-color); color: #fff; }
        .audit-btn.pass {
            background: var(--success-color);
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .excel-table { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid var(--border-color); text-align: left; }
        th { background: var(--bg-second); font-weight: bold; }
    </style>
</head>
<body>
    <div class="pc-screen">
        <div class="top-nav">
            <div class="nav-title">卢米纳电子库存与财务一体化系统</div>
            <div class="nav-menu">
                <div class="nav-item active">工作台</div>
                <div class="nav-item" onclick="window.location.href='receivable.html'">应收账款管理</div>
                <div class="nav-item" onclick="window.location.href='refund-audit.html'">退款审核</div>
                <div class="nav-item" onclick="window.location.href='audit-log.html'">审计日志</div>
                <div class="nav-item" onclick="window.location.href='report.html'">报表导出</div>
            </div>
            <div class="nav-right">
                <div class="eye-switch-wrap">
                    <span>护眼模式</span>
                    <div class="eye-switch" id="eyeSwitch" onclick="toggleEyeProtect()">
                        <div class="eye-dot"></div>
                    </div>
                </div>
                <div class="user-info">登录人：陈总监 | <span id="currentDate"></span></div>
            </div>
        </div>

        <div class="metric-grid" id="metricGrid">
            <div class="metric-card">
                <div class="metric-title">今日待审核退款</div>
                <div class="metric-value red" id="pendingRefundCount">--</div>
                <div class="metric-desc" id="pendingRefundDesc">加载中...</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">逾期应收款</div>
                <div class="metric-value red" id="overdueAmount">--</div>
                <div class="metric-desc" id="overdueCount">加载中...</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">本月库存差异率</div>
                <div class="metric-value yellow" id="diffRate">--</div>
                <div class="metric-desc">审计红线：≤3%</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">未按时录入B2B订单</div>
                <div class="metric-value red" id="lateOrderCount">--</div>
                <div class="metric-desc">笔 | 需催办录入</div>
            </div>
        </div>

        <div class="main-content">
            <div class="todo-section">
                <div class="section-header"><span>待办事项（超时优先）</span></div>
                <div class="todo-list" id="todoList"><div style="padding:20px;text-align:center;">加载中...</div></div>
            </div>
            <div class="quick-section">
                <div class="section-header"><span>快捷功能</span></div>
                <div class="quick-menu">
                    <a href="javascript:void(0)" class="menu-item export" onclick="exportSalesReport()">导出合并销售报表</a>
                    <a href="javascript:void(0)" class="menu-item export" onclick="exportReceivableReport()">导出应收款Excel</a>
                    <a href="javascript:void(0)" class="menu-item" onclick="window.location.href='receivable.html'">应收账款管理</a>
                    <a href="javascript:void(0)" class="menu-item" onclick="window.location.href='refund-audit.html'">退款审核</a>
                    <a href="javascript:void(0)" class="menu-item" onclick="window.location.href='audit-log.html'">审计日志</a>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-mask" id="urgeModal">
        <div class="modal">
            <div class="modal-header"><span class="modal-title">未录入事项催办</span><button class="close-btn" onclick="closeUrgeModal()">×</button></div>
            <div class="modal-body" id="urgeTableContainer"></div>
            <div class="modal-footer">
                <button class="modal-btn cancel" onclick="closeUrgeModal()">取消</button>
                <button class="modal-btn confirm" style="background:var(--danger-color);" onclick="sendAllUrge()">一键催办全部</button>
            </div>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/toast.js"></script>
    <script>
        const today = new Date();
        document.getElementById('currentDate').innerText = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

        function loadDashboard() {
            var refundData = JSON.parse(localStorage.getItem('refundData') || '[]');
            var receivableData = JSON.parse(localStorage.getItem('receivableData') || '[]');
            var orderData = JSON.parse(localStorage.getItem('orderData') || '[]');
            
            var pendingRefunds = refundData.filter(function(r) { return r.status === '待审核' || r.status === '超时1天'; });
            document.getElementById('pendingRefundCount').innerText = pendingRefunds.length;
            var overdueRefunds = pendingRefunds.filter(function(r) { return r.status === '超时1天'; });
            document.getElementById('pendingRefundDesc').innerHTML = '笔 | ' + (overdueRefunds.length > 0 ? overdueRefunds.length + '笔超时未审核' : '全部正常');
            
            var overdueItems = receivableData.filter(function(r) { return r.statusText && r.statusText.indexOf('逾期') !== -1; });
            var overdueAmount = overdueItems.reduce(function(sum, r) { return sum + (r.amount - (r.received || 0)); }, 0);
            document.getElementById('overdueAmount').innerText = (overdueAmount / 10000).toFixed(0);
            document.getElementById('overdueCount').innerHTML = '万元 | 共' + overdueItems.length + '笔超期';
            
            var stockData = JSON.parse(localStorage.getItem('stockData') || '[]');
            var totalDiff = 0, totalQty = 0;
            stockData.forEach(function(s) { totalDiff += Math.abs(s.difference || 0); totalQty += (s.warehouse_qty || 0); });
            var diffRate = totalQty > 0 ? (totalDiff / totalQty * 100).toFixed(1) : 0;
            document.getElementById('diffRate').innerHTML = diffRate + '%';
            
            var lateOrders = orderData.filter(function(o) { return o.status === '待发货' && new Date(o.orderDate) < new Date(); });
            document.getElementById('lateOrderCount').innerText = lateOrders.length;
            
            var html = '';
            pendingRefunds.forEach(function(item) {
                if (item.status === '超时1天') {
                    html += `<div class="todo-item"><div class="todo-content">退款审核：${item.orderId || ''} | 客户：${item.customer || ''}<span class="todo-tag red">超时1天</span></div><button class="todo-btn danger" onclick="window.location.href='refund-audit.html'">立即审核</button></div>`;
                }
            });
            overdueItems.slice(0, 3).forEach(function(item) {
                html += `<div class="todo-item"><div class="todo-content">应收款预警：${item.customer || ''} | 金额：${((item.amount - (item.received || 0))/10000).toFixed(1)}万<span class="todo-tag red">逾期</span></div><button class="todo-btn primary" onclick="window.location.href='receivable.html'">查看详情</button></div>`;
            });
            lateOrders.slice(0, 2).forEach(function(item) {
                html += `<div class="todo-item"><div class="todo-content">B2B订单未录入：${item.id || ''} | 客户：${item.customer || ''}<span class="todo-tag red">超时</span></div><button class="todo-btn warning" onclick="openUrgeModal()">催办录入</button></div>`;
            });
            if (html === '') html = '<div style="padding:20px;text-align:center;color:var(--text-second);">暂无待办事项</div>';
            document.getElementById('todoList').innerHTML = html;
        }
        
        function exportSalesReport() {
            var orderData = JSON.parse(localStorage.getItem('orderData') || '[]');
            var receivableData = JSON.parse(localStorage.getItem('receivableData') || '[]');
            var reportData = orderData.map(function(order) {
                var receivable = receivableData.find(function(r) { return r.orderId === order.id; });
                return { '订单编号': order.id, '客户名称': order.customer, '订单金额': order.amount, '已收金额': receivable ? (receivable.received || 0) : 0, '应收余额': (order.amount - (receivable ? (receivable.received || 0) : 0)), '合同账期': order.dueDate, '订单状态': order.status };
            });
            if (typeof XLSX !== 'undefined') { var ws = XLSX.utils.json_to_sheet(reportData); var wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, '合并销售报表'); XLSX.writeFile(wb, '合并销售报表.xlsx'); showToast('导出成功', 'success'); addAuditLog('报表导出', '导出合并销售报表', '-', '文件：合并销售报表'); }
            else { alert('导出组件加载中，请稍后重试'); }
        }
        
        function exportReceivableReport() {
            var receivableData = JSON.parse(localStorage.getItem('receivableData') || '[]');
            if (typeof XLSX !== 'undefined') { var ws = XLSX.utils.json_to_sheet(receivableData); var wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, '应收账款台账'); XLSX.writeFile(wb, '应收账款台账.xlsx'); showToast('导出成功', 'success'); addAuditLog('报表导出', '导出应收账款台账', '-', '文件：应收账款台账'); }
            else { alert('导出组件加载中，请稍后重试'); }
        }
        
        var urgeItems = [];
        function openUrgeModal() {
            var orderData = JSON.parse(localStorage.getItem('orderData') || '[]');
            var refundData = JSON.parse(localStorage.getItem('refundData') || '[]');
            urgeItems = [];
            var lateOrders = orderData.filter(function(o) { return o.status === '待发货' && new Date(o.orderDate) < new Date(); });
            lateOrders.forEach(function(o) { urgeItems.push({ department: '销售部', person: '张经理', phone: '136XXXX1234', matter: 'B2B订单未录入', documentNo: o.id }); });
            var pendingRefunds = refundData.filter(function(r) { return r.status === '待审核'; });
            pendingRefunds.forEach(function(r) { urgeItems.push({ department: '仓库部', person: '王主管', phone: '135XXXX6789', matter: '退货单待处理', documentNo: r.id }); });
            if (urgeItems.length === 0) urgeItems.push({ department: '暂无', person: '暂无', phone: '-', matter: '暂无待催办事项', documentNo: '-' });
            var html = '<table><thead><tr><th>责任部门</th><th>责任人</th><th>联系电话</th><th>未录入事项</th><th>单据号</th><th>操作</th></tr></thead><tbody>';
            urgeItems.forEach(function(item, idx) { if (item.department !== '暂无') { html += `<tr><td>${item.department}</td><td>${item.person}</td><td>${item.phone}</td><td>${item.matter}</td><td>${item.documentNo}</td><td><button class="audit-btn pass" onclick="sendSingleUrge(${idx})">一键催办</button></td></tr>`; } else { html += `<tr><td colspan="6" style="text-align:center;">暂无待催办事项</td></tr>`; } });
            html += '</tbody></table>';
            document.getElementById('urgeTableContainer').innerHTML = html;
            document.getElementById('urgeModal').style.display = 'flex';
        }
        function sendSingleUrge(idx) { var item = urgeItems[idx]; showToast(`催办通知已发送给${item.person}`, 'success'); addAuditLog('催办', `发送催办通知至${item.person}`, '-', `事项：${item.matter}，单据：${item.documentNo}`); }
        function sendAllUrge() { var count = 0; urgeItems.forEach(function(item) { if (item.department !== '暂无') { count++; addAuditLog('催办', `发送催办通知至${item.person}`, '-', `事项：${item.matter}，单据：${item.documentNo}`); } }); showToast(`已发送${count}条催办通知`, 'success'); closeUrgeModal(); }
        function closeUrgeModal() { document.getElementById('urgeModal').style.display = 'none'; }
        document.getElementById('urgeModal').addEventListener('click', function(e) { if(e.target === this) closeUrgeModal(); });
        
        loadDashboard();
    </script>
</body>
</html>
