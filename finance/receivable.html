<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应收账款管理 - 卢米纳电子</title>
    <link rel="stylesheet" href="../css/common.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f2f5;
        }
        .pc-screen {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            height: 60px;
            background: #fff;
            border-bottom: 1px solid #e8e8e8;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .nav-title {
            font-size: 18px;
            font-weight: bold;
            color: #1890ff;
        }
        .nav-menu {
            display: flex;
            gap: 8px;
        }
        .nav-item {
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.3s;
            color: #333;
        }
        .nav-item:hover {
            background: #f5f5f5;
        }
        .nav-item.active {
            color: #1890ff;
            background: #e6f7ff;
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .eye-switch-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .eye-switch {
            width: 44px;
            height: 22px;
            background: #ccc;
            border-radius: 22px;
            cursor: pointer;
            position: relative;
            transition: 0.3s;
        }
        .eye-switch.active {
            background: #1890ff;
        }
        .eye-dot {
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 3px;
            transition: 0.3s;
        }
        .eye-switch.active .eye-dot {
            left: 23px;
        }
        .user-info {
            font-size: 14px;
            color: #666;
        }
        .filter-bar {
            padding: 15px 24px;
            background: #fff;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-label {
            font-size: 14px;
            color: #666;
        }
        .filter-input, .filter-select {
            padding: 6px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            background: #fff;
        }
        .filter-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .filter-btn:first-of-type {
            background: #1890ff;
            color: #fff;
        }
        .filter-btn.secondary {
            background: #f5f5f5;
            color: #666;
        }
        .filter-btn.export {
            background: #52c41a;
            color: #fff;
        }
        .main-content {
            display: flex;
            gap: 20px;
            padding: 20px 24px;
            flex: 1;
            overflow: hidden;
        }
        .ledger-section {
            flex: 1;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e8e8e8;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .rule-section {
            width: 320px;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e8e8e8;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .section-header {
            padding: 12px 16px;
            border-bottom: 1px solid #e8e8e8;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fafafa;
        }
        .excel-table {
            overflow-x: auto;
            flex: 1;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            padding: 10px 12px;
            border: 1px solid #e8e8e8;
            text-align: left;
        }
        th {
            background: #f5f5f5;
            font-weight: 600;
        }
        /* 状态颜色 */
        .status-red {
            color: #dc3545 !important;
            font-weight: bold;
        }
        .status-yellow {
            color: #ffc107 !important;
            font-weight: bold;
        }
        .status-green {
            color: #28a745 !important;
            font-weight: bold;
        }
        /* 逾期行背景色 */
        .row-overdue {
            background-color: #fff2f0 !important;
        }
        .audit-btn {
            padding: 4px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 0 4px;
            font-size: 12px;
        }
        .audit-btn.pass {
            background: #52c41a;
            color: #fff;
        }
        .audit-btn.primary {
            background: #1890ff;
            color: #fff;
        }
        .rule-title {
            font-size: 16px;
            font-weight: bold;
            padding-bottom: 10px;
            border-bottom: 1px solid #e8e8e8;
        }
        .rule-desc {
            font-size: 12px;
            color: #999;
            line-height: 1.4;
        }
        .rule-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }
        .save-btn {
            margin-top: 20px;
            height: 40px;
            background: #1890ff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        .modal-mask {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal {
            background: #fff;
            border-radius: 8px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow: auto;
        }
        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title {
            font-size: 18px;
            font-weight: bold;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        .modal-body {
            padding: 20px;
        }
        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid #e8e8e8;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .modal-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .modal-btn.cancel {
            background: #f5f5f5;
        }
        .modal-btn.confirm {
            background: #1890ff;
            color: #fff;
        }
        .form-input, .form-textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            margin-top: 5px;
        }
        .readonly-text {
            color: #999;
        }
    </style>
</head>
<body>
<div class="pc-screen">
    <div class="top-nav">
        <div class="nav-title">卢米纳电子库存与财务一体化系统</div>
        <div class="nav-menu">
            <div class="nav-item" onclick="window.location.href='index.html'">工作台</div>
            <div class="nav-item active">应收账款管理</div>
            <div class="nav-item" onclick="window.location.href='refund-audit.html'">退款审核</div>
            <div class="nav-item" onclick="window.location.href='audit-log.html'">审计日志</div>
            <div class="nav-item" onclick="window.location.href='report.html'">报表导出</div>
        </div>
        <div class="nav-right">
            <div class="eye-switch-wrap">
                <span>护眼模式</span>
                <div class="eye-switch" id="eyeSwitch" onclick="toggleEyeProtect()">
                    <div class="eye-dot"></div>
                </div>
            </div>
            <div class="user-info">登录人：陈总监 | <span id="currentDate"></span></div>
        </div>
    </div>

    <div class="filter-bar">
        <div class="filter-item">
            <span class="filter-label">客户名称：</span>
            <input type="text" class="filter-input" id="customerName" placeholder="请输入客户名称">
        </div>
        <div class="filter-item">
            <span class="filter-label">账期状态：</span>
            <select class="filter-select" id="statusFilter">
                <option value="全部">全部</option>
                <option value="正常">正常</option>
                <option value="预警">预警</option>
                <option value="逾期">逾期</option>
            </select>
        </div>
        <button class="filter-btn" onclick="loadReceivableList()">查询</button>
        <button class="filter-btn secondary" onclick="resetFilters()">重置</button>
        <button class="filter-btn export" onclick="exportReceivableToExcel()">导出Excel</button>
    </div>

    <div class="main-content">
        <div class="ledger-section">
            <div class="section-header">
                <span>应收账款台账</span>
                <span id="recordCount">加载中...</span>
            </div>
            <div class="excel-table">
                <table id="receivableTable">
                    <thead>
                        <tr>
                            <th>订单编号</th>
                            <th>客户名称</th>
                            <th>应收金额</th>
                            <th>合同账期</th>
                            <th>已收金额</th>
                            <th>下次提醒时间</th>
                            <th>核销状态</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="receivableTableBody">
                        <tr><td colspan="9" style="text-align:center;">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="rule-section">
            <div class="rule-title">多级预警规则设置</div>
            <div class="rule-desc">系统根据合同账期+勾选规则，自动计算下次提醒时间</div>
            <div class="rule-item"><span>账期前7天提醒</span><input type="checkbox" id="rule7d" checked></div>
            <div class="rule-item"><span>账期前3天提醒</span><input type="checkbox" id="rule3d" checked></div>
            <div class="rule-item"><span>账期前1天提醒</span><input type="checkbox" id="rule1d" checked></div>
            <div class="rule-item"><span>逾期1天标红预警</span><input type="checkbox" id="ruleOverdue" checked></div>
            <div class="rule-item"><span>逾期15天抄送COO</span><input type="checkbox" id="ruleEscalate" checked></div>
            <button class="save-btn" onclick="saveAlertRules()">保存规则并更新台账</button>
        </div>
    </div>
</div>

<div class="modal-mask" id="urgeModal">
    <div class="modal">
        <div class="modal-header">
            <span class="modal-title" id="urgeModalTitle">催款日志</span>
            <button class="close-btn" onclick="closeUrgeModal()">×</button>
        </div>
        <div class="modal-body" id="urgeModalBody"></div>
        <div class="modal-footer">
            <button class="modal-btn cancel" onclick="closeUrgeModal()">取消</button>
            <button class="modal-btn confirm" onclick="saveUrgeRecord()">保存催款记录</button>
        </div>
    </div>
</div>

<script src="../js/common.js"></script>
<script src="../js/toast.js"></script>
<script>
    var currentReceivableList = [], currentUrgeOrder = null;
    const todayDate = new Date();
    document.getElementById('currentDate').innerText = `${todayDate.getFullYear()}-${String(todayDate.getMonth()+1).padStart(2,'0')}-${String(todayDate.getDate()).padStart(2,'0')}`;

    function loadReceivableList() {
        var customerName = document.getElementById('customerName').value;
        var status = document.getElementById('statusFilter').value;
        var data = JSON.parse(localStorage.getItem('receivableData') || '[]');
        
        if (customerName) {
            data = data.filter(function(r) { return r.customer && r.customer.indexOf(customerName) !== -1; });
        }
        if (status !== '全部') {
            if (status === '逾期') {
                data = data.filter(function(r) { return r.statusText && r.statusText.indexOf('逾期') !== -1; });
            } else if (status === '预警') {
                data = data.filter(function(r) { return r.statusText && r.statusText.indexOf('账期前') !== -1; });
            } else if (status === '正常') {
                data = data.filter(function(r) { return r.statusText === '正常'; });
            }
        }
        
        currentReceivableList = data;
        renderReceivableTable(data);
        document.getElementById('recordCount').innerText = '共 ' + data.length + ' 条记录';
    }

    function renderReceivableTable(data) {
        var tbody = document.getElementById('receivableTableBody');
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;">暂无数据</td></tr>';
            return;
        }
        
        var html = '';
        for (var i = 0; i < data.length; i++) {
            var item = data[i];
            var rowClass = '';
            var statusClass = 'status-green';
            var writeOffClass = 'status-yellow';
            
            // 判断状态和样式
            if (item.statusText && item.statusText.indexOf('逾期') !== -1) {
                rowClass = 'row-overdue';
                statusClass = 'status-red';
                writeOffClass = 'status-red';
            } else if (item.statusText && item.statusText.indexOf('账期前') !== -1) {
                statusClass = 'status-yellow';
                writeOffClass = 'status-yellow';
            }
            
            if (item.status === '已核销') {
                writeOffClass = 'status-green';
            } else if (item.status === '待核销') {
                writeOffClass = 'status-yellow';
            } else {
                writeOffClass = 'status-red';
            }
            
            var remainingAmount = (item.amount - (item.received || 0));
            var writeOffBtn = '';
            if (item.status !== '已核销') {
                writeOffBtn = '<button class="audit-btn pass" onclick="openWriteOff(\'' + item.orderId + '\', ' + remainingAmount + ')">核销</button>';
            }
            
            html += '<tr class="' + rowClass + '">' +
                '<td>' + (item.orderId || '') + '</td>' +
                '<td>' + (item.customer || '') + '</td>' +
                '<td>' + (item.amount || 0).toLocaleString() + '元</td>' +
                '<td>' + (item.dueDate || '') + '</td>' +
                '<td class="readonly-text">' + (item.received || 0).toLocaleString() + '元</td>' +
                '<td>' + (item.nextRemind || '') + '</td>' +
                '<td class="' + writeOffClass + '">' + (item.status === '已核销' ? '已核销' : (item.status === '待核销' ? '待核销' : '未核销')) + '</td>' +
                '<td class="' + statusClass + '">' + (item.statusText || '') + '</td>' +
                '<td>' + writeOffBtn + '<button class="audit-btn primary" onclick="openUrge(\'' + item.orderId + '\', \'' + item.customer + '\', ' + remainingAmount + ')">催款</button></td>' +
                '</tr>';
        }
        tbody.innerHTML = html;
    }

    function openWriteOff(orderNo, remainingAmount) {
        var amount = prompt('请输入核销金额（元），最大金额：' + remainingAmount.toLocaleString());
        if (amount && !isNaN(parseFloat(amount))) {
            confirmWriteOff(orderNo, parseFloat(amount));
        }
    }

    function confirmWriteOff(orderNo, amount) {
        var receivableData = JSON.parse(localStorage.getItem('receivableData') || '[]');
        var record = null;
        for (var i = 0; i < receivableData.length; i++) {
            if (receivableData[i].orderId === orderNo) {
                record = receivableData[i];
                break;
            }
        }
        if (record) {
            record.received = (record.received || 0) + amount;
            if (record.received >= record.amount) {
                record.status = '已核销';
                record.statusText = '已结清';
                record.nextRemind = '已完成';
            }
            localStorage.setItem('receivableData', JSON.stringify(receivableData));
            if (typeof showToast === 'function') showToast('核销成功', 'success');
            if (typeof addAuditLog === 'function') addAuditLog('应收账款核销', '核销订单 ' + orderNo, '待核销', '已核销' + amount + '元', orderNo);
            loadReceivableList();
        }
    }

    function openUrge(orderNo, customer, amount) {
        currentUrgeOrder = { orderNo: orderNo, customer: customer, amount: amount };
        document.getElementById('urgeModalTitle').innerText = '催款日志 - 订单 ' + orderNo;
        var html = '<div style="padding:12px;background:#f5f5f5;border-radius:4px;margin-bottom:15px;">' +
            '<div><b>客户名称：</b>' + customer + '</div>' +
            '<div><b>应收余额：</b>' + amount.toLocaleString() + '元</div>' +
            '</div>' +
            '<div style="margin-bottom:15px;"><label>催款日期</label><input type="datetime-local" id="urgeDate" class="form-input" value="' + new Date().toISOString().slice(0,16) + '"></div>' +
            '<div style="margin-bottom:15px;"><label>下次跟进时间</label><input type="date" id="nextFollowUp" class="form-input"></div>' +
            '<div style="margin-bottom:15px;"><label>沟通内容</label><textarea id="urgeContent" class="form-textarea" rows="3" placeholder="请填写本次催款沟通的核心内容"></textarea></div>' +
            '<div style="margin-bottom:15px;"><label>客户回复/承诺</label><textarea id="customerReply" class="form-textarea" rows="3" placeholder="请填写客户的回复、付款承诺等关键信息"></textarea></div>';
        document.getElementById('urgeModalBody').innerHTML = html;
        document.getElementById('urgeModal').style.display = 'flex';
    }

    function saveUrgeRecord() {
        var urgeDate = document.getElementById('urgeDate') ? document.getElementById('urgeDate').value : new Date().toISOString();
        var urgeContent = document.getElementById('urgeContent') ? document.getElementById('urgeContent').value : '';
        var customerReply = document.getElementById('customerReply') ? document.getElementById('customerReply').value : '';
        if (typeof addAuditLog === 'function') {
            addAuditLog('催款', '催款订单 ' + currentUrgeOrder.orderNo, '-', '催款日期：' + urgeDate + '，沟通内容：' + urgeContent + '，客户回复：' + customerReply, currentUrgeOrder.orderNo);
        }
        if (typeof showToast === 'function') showToast('催款记录已保存', 'success');
        closeUrgeModal();
    }

    function closeUrgeModal() {
        document.getElementById('urgeModal').style.display = 'none';
    }

    function exportReceivableToExcel() {
        if (typeof XLSX !== 'undefined') {
            var exportData = [];
            for (var i = 0; i < currentReceivableList.length; i++) {
                var item = currentReceivableList[i];
                exportData.push({
                    '订单编号': item.orderId,
                    '客户名称': item.customer,
                    '应收金额': item.amount,
                    '已收金额': item.received || 0,
                    '应收余额': (item.amount - (item.received || 0)),
                    '合同账期': item.dueDate,
                    '核销状态': item.status === '已核销' ? '已核销' : (item.status === '待核销' ? '待核销' : '未核销'),
                    '状态': item.statusText
                });
            }
            var ws = XLSX.utils.json_to_sheet(exportData);
            var wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, '应收账款台账');
            var date = new Date();
            var dateStr = date.getFullYear() + String(date.getMonth()+1).padStart(2,'0') + String(date.getDate()).padStart(2,'0');
            XLSX.writeFile(wb, '应收账款台账_' + dateStr + '.xlsx');
            if (typeof showToast === 'function') showToast('导出成功', 'success');
            if (typeof addAuditLog === 'function') addAuditLog('报表导出', '导出应收账款台账', '-', '文件：应收账款台账');
        } else {
            alert('导出组件加载中，请稍后重试');
        }
    }

    function resetFilters() {
        document.getElementById('customerName').value = '';
        document.getElementById('statusFilter').value = '全部';
        loadReceivableList();
    }

    function saveAlertRules() {
        var rules = {
            remind7d: document.getElementById('rule7d').checked,
            remind3d: document.getElementById('rule3d').checked,
            remind1d: document.getElementById('rule1d').checked,
            overdueAlert: document.getElementById('ruleOverdue').checked,
            escalateCOO: document.getElementById('ruleEscalate').checked
        };
        localStorage.setItem('alertRules', JSON.stringify(rules));
        if (typeof showToast === 'function') showToast('规则已保存，台账提醒时间已自动重新计算', 'success');
        if (typeof addAuditLog === 'function') addAuditLog('预警规则', '更新多级预警规则', '-', JSON.stringify(rules));
    }

    loadReceivableList();
    document.getElementById('urgeModal').addEventListener('click', function(e) {
        if(e.target === this) closeUrgeModal();
    });
</script>
</body>
</html>
