<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B2B订单发货确认 - 卢米纳电子</title>
    <link rel="stylesheet" href="../css/common.css">
    <style>
        .nav-bar {
            height: 100px;
            background: var(--bg-main);
            border-bottom: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 0 30px;
        }
        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
            border-bottom: 1px solid var(--bg-second);
        }
        .review-switch-wrap {
            height: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .switch-label {
            font-size: 19px;
            font-weight: bold;
            color: var(--text-main);
        }
        .review-switch {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .switch-status {
            font-size: 18px;
            font-weight: bold;
        }
        .switch-status.open { color: var(--success-color); }
        .switch-btn {
            width: 80px;
            height: 40px;
            background: #cccccc;
            border-radius: 40px;
            position: relative;
            cursor: pointer;
            border: 2px solid var(--border-color);
        }
        .switch-btn.open { background: var(--success-color); }
        .switch-dot {
            width: 34px;
            height: 34px;
            background: #ffffff;
            border-radius: 50%;
            position: absolute;
            top: 1px;
            left: 1px;
            transition: 0.3s;
            border: 1px solid var(--border-color);
        }
        .switch-btn.open .switch-dot { left: 43px; }
        .order-info {
            margin: 15px 30px;
            background: var(--bg-main);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            font-size: 17px;
            line-height: 1.8;
            color: var(--text-main);
            font-weight: 500;
        }
        .review-status-tip {
            margin: 0 30px 15px;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            border: 3px solid;
        }
        .review-status-tip.wait {
            background: #fff8e8;
            border-color: var(--warning-color);
            color: var(--warning-color);
        }
        .detail-list {
            margin: 0 30px;
            background: var(--bg-main);
            border: 2px solid var(--border-color);
            border-radius: 4px;
            flex: 1;
            overflow-y: auto;
        }
        .list-header {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr 1fr 1fr;
            background: var(--bg-second);
            padding: 12px 8px;
            font-weight: bold;
            border-bottom: 2px solid var(--border-color);
            font-size: 16px;
            color: var(--text-main);
        }
        .list-row {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr 1fr 1fr;
            padding: 12px 8px;
            border-bottom: 1px solid var(--table-border);
            align-items: center;
            font-size: 15px;
            color: var(--text-main);
            font-weight: 500;
        }
        .scan-btn {
            height: 48px;
            background: var(--primary-color);
            color: #ffffff;
            border: 2px solid #003366;
            border-radius: 4px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }
        .action-area {
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .main-btn {
            width: 100%;
            height: 90px;
            border: 3px solid;
            border-radius: 8px;
            font-size: 26px;
            font-weight: bold;
            cursor: pointer;
            color: #fff;
        }
        .submit-btn {
            background: var(--primary-color);
            border-color: #003366;
        }
        .review-pass-btn {
            background: var(--success-color);
            border-color: #006600;
        }
        .cancel-btn {
            height: 50px;
            width: 150px;
            background: var(--bg-main);
            color: var(--text-main);
            border: 2px solid var(--border-color);
            border-radius: 4px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="pc-screen">
        <div class="nav-bar">
            <div class="nav-top">
                <a href="index.html" class="back-btn">← 返回首页</a>
                <span class="nav-title">B2B订单发货详情</span>
                <span class="status-tag" style="background: var(--warning-color); color: #fff; padding: 6px 12px; border-radius: 4px;">待发货</span>
            </div>
            <div class="review-switch-wrap">
                <span class="switch-label">库存扣减人工复核总开关</span>
                <div class="review-switch">
                    <span class="switch-status open" id="switchText">已开启</span>
                    <div class="switch-btn open" id="reviewSwitch" onclick="toggleReviewSwitch()">
                        <div class="switch-dot"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="order-info">
            <div>订单编号：B2B20260507001</div>
            <div>客户名称：华为技术有限公司</div>
            <div>签约日期：2026-05-06</div>
            <div>总金额：150000元</div>
            <div>要求发货时间：2026-05-08</div>
        </div>

        <div class="review-status-tip wait" id="reviewStatusTip">
            待人工复核确认，复核通过后库存才会扣减
        </div>

        <div class="detail-list">
            <div class="list-header">
                <span>SKU</span>
                <span>品名</span>
                <span>下单数量</span>
                <span>应发数量</span>
                <span>操作</span>
            </div>
            <div class="list-row">
                <span>MS-200</span>
                <span>智能门锁</span>
                <span>50</span>
                <span>50</span>
                <button class="scan-btn">扫码核对</button>
            </div>
            <div class="list-row">
                <span>CAM-300</span>
                <span>监控摄像头</span>
                <span>100</span>
                <span>100</span>
                <button class="scan-btn">扫码核对</button>
            </div>
            <div class="list-row">
                <span>SPK-100</span>
                <span>智能音箱</span>
                <span>200</span>
                <span>200</span>
                <button class="scan-btn">扫码核对</button>
            </div>
        </div>

        <div class="action-area" id="actionArea">
            <button class="main-btn submit-btn" id="submitBtn" onclick="submitApply()">
                提交发货复核申请
            </button>
            <button class="cancel-btn" onclick="window.location.href='index.html'">取消</button>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script>
        let isReviewOpen = true;
        let applyStatus = 0;

        function toggleReviewSwitch() {
            const switchEl = document.getElementById('reviewSwitch');
            const switchText = document.getElementById('switchText');
            const statusTip = document.getElementById('reviewStatusTip');
            const actionArea = document.getElementById('actionArea');
            
            isReviewOpen = !isReviewOpen;
            switchEl.classList.toggle('open', isReviewOpen);
            
            if(isReviewOpen) {
                switchText.innerText = '已开启';
                switchText.className = 'switch-status open';
                statusTip.style.display = 'block';
                statusTip.className = 'review-status-tip wait';
                statusTip.innerText = '待人工复核确认，复核通过后库存才会扣减';
                applyStatus = 0;
                resetActionBtn();
            } else {
                switchText.innerText = '已关闭';
                switchText.className = 'switch-status';
                statusTip.style.display = 'block';
                statusTip.className = 'review-status-tip';
                statusTip.style.background = '#ffe8e8';
                statusTip.style.borderColor = 'var(--danger-color)';
                statusTip.style.color = 'var(--danger-color)';
                statusTip.innerText = '人工复核已关闭，确认发货将直接扣减库存';
                actionArea.innerHTML = `
                    <button class="main-btn submit-btn" onclick="directSend()">
                        确认发货（直接扣减库存）
                    </button>
                    <button class="cancel-btn" onclick="window.location.href='index.html'">取消</button>
                `;
            }
        }

        function submitApply() {
            if(applyStatus !== 0) return;
            applyStatus = 1;
            const statusTip = document.getElementById('reviewStatusTip');
            const actionArea = document.getElementById('actionArea');
            
            statusTip.className = 'review-status-tip wait';
            statusTip.innerText = '已提交申请，待人工复核确认';
            actionArea.innerHTML = `
                <button class="main-btn review-pass-btn" onclick="reviewPass()">
                    人工复核通过（确认扣减库存）
                </button>
                <button class="cancel-btn" onclick="resetActionBtn()">取消</button>
            `;
            addAuditLog('发货申请', '提交发货申请 B2B20260507001', '-', '待复核');
        }

        function reviewPass() {
            if(applyStatus !== 1) return;
            applyStatus = 2;
            const statusTip = document.getElementById('reviewStatusTip');
            const actionArea = document.getElementById('actionArea');
            
            statusTip.className = 'review-status-tip';
            statusTip.style.background = '#e8f8e8';
            statusTip.style.borderColor = 'var(--success-color)';
            statusTip.style.color = 'var(--success-color)';
            statusTip.innerText = '人工复核已通过，库存已正式扣减';
            actionArea.innerHTML = `
                <button class="main-btn review-pass-btn" disabled>
                    复核已完成
                </button>
            `;
            addAuditLog('库存变动', '确认发货 B2B20260507001', 'SPK100 库存：246', 'SPK100 库存：46');
            alert('发货成功！库存已扣减，状态已同步财务/销售端');
        }

        function directSend() {
            addAuditLog('库存变动', '直接发货 B2B20260507001', 'SPK100 库存：246', 'SPK100 库存：46');
            alert('发货成功！库存已直接扣减');
        }

        function resetActionBtn() {
            document.getElementById('actionArea').innerHTML = `
                <button class="main-btn submit-btn" id="submitBtn" onclick="submitApply()">
                    提交发货复核申请
                </button>
                <button class="cancel-btn" onclick="window.location.href='index.html'">取消</button>
            `;
        }
    </script>
</body>
</html>
