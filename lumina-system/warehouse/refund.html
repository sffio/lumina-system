<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>退货录入 - 卢米纳电子</title>
    <link rel="stylesheet" href="../css/common.css">
    <style>
        .form-container {
            width: 600px;
            margin: 30px auto;
            background: var(--bg-main);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 30px;
        }
        .form-title {
            font-size: 22px;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 16px;
            color: var(--text-main);
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-input {
            width: 100%;
            height: 45px;
            padding: 0 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 16px;
            background: var(--bg-main);
            color: var(--text-main);
        }
        .form-textarea {
            width: 100%;
            height: 100px;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 16px;
            background: var(--bg-main);
            color: var(--text-main);
            resize: none;
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        .input-group .form-input {
            flex: 1;
        }
        .input-btn {
            height: 45px;
            padding: 0 20px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        .input-btn.voice { background: var(--success-color); }
        .submit-btn {
            width: 100%;
            height: 50px;
            background: var(--success-color);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .back-btn {
            margin: 20px 30px;
        }
    </style>
</head>
<body>
    <div class="pc-screen">
        <div class="top-nav">
            <div class="nav-title">卢米纳电子库存与财务一体化系统</div>
            <div class="nav-right">
                <div class="eye-switch-wrap">
                    <span>护眼模式</span>
                    <div class="eye-switch" id="eyeSwitch" onclick="toggleEyeProtect()">
                        <div class="eye-dot"></div>
                    </div>
                </div>
                <div class="user-info">登录人：王主管 | <span id="currentDate"></span></div>
            </div>
        </div>

        <a href="index.html" class="back-btn">← 返回首页</a>

        <div class="form-container">
            <div class="form-title">退货录入</div>
            
            <div class="form-group">
                <label class="form-label">* SN码（对账必填）</label>
                <div class="input-group">
                    <input type="text" class="form-input" id="snCode" placeholder="请扫码/手动输入SN码">
                    <button class="input-btn" onclick="scanCode()">扫码录入</button>
                    <button class="input-btn voice" onclick="voiceInput()">语音输入</button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">* 退货原因</label>
                <select class="form-input" id="refundReason">
                    <option value="">请选择退货原因</option>
                    <option value="质量问题">质量问题</option>
                    <option value="7天无理由">7天无理由退货</option>
                    <option value="发错货">发错货</option>
                    <option value="其他">其他原因</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">手写备注/补充说明（选填）</label>
                <textarea class="form-textarea" id="remark" placeholder="请输入补充说明"></textarea>
            </div>

            <button class="submit-btn" onclick="submitRefund()">提交退货录入</button>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script>
        // 自动填充当前日期
        const today = new Date();
        document.getElementById('currentDate').innerText = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

        function scanCode() {
            alert('正在调用摄像头扫码...\n模拟扫码成功：SN20260510001');
            document.getElementById('snCode').value = 'SN20260510001';
        }

        function voiceInput() {
            alert('正在启动语音识别...\n模拟语音输入成功：SN20260510002');
            document.getElementById('snCode').value = 'SN20260510002';
        }

        function submitRefund() {
            const sn = document.getElementById('snCode').value;
            const reason = document.getElementById('refundReason').value;
            const remark = document.getElementById('remark').value;

            if(!sn || !reason) {
                alert('请填写必填项！');
                return;
            }

            // 保存到localStorage，财务端自动同步
            const refunds = JSON.parse(localStorage.getItem('refundData') || '[]');
            const newRefund = {
                id: 'RT' + Date.now(),
                orderId: 'ORD' + Date.now(),
                sn: sn,
                customer: '客户' + Math.floor(Math.random()*1000),
                phone: '138XXXX' + Math.floor(Math.random()*10000),
                account: '6226XXXX' + Math.floor(Math.random()*10000),
                bank: '招商银行北京海淀支行',
                amount: Math.floor(Math.random()*5000) + 100,
                product: 'SPK100 智能音箱',
                quality: '已确认质量问题',
                operator: '王主管',
                status: '待审核',
                createTime: new Date().toLocaleString()
            };
            refunds.unshift(newRefund);
            localStorage.setItem('refundData', JSON.stringify(refunds));

            addAuditLog('退货录入', `录入退货 ${newRefund.id}`, '-', `SN码：${sn}`);
            alert('退货录入成功！财务端已自动同步待审核记录');
            // 清空表单
            document.getElementById('snCode').value = '';
            document.getElementById('refundReason').value = '';
            document.getElementById('remark').value = '';
        }
    </script>
</body>
</html>
